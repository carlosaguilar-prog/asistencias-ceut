<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEUT | Portal del Alumno</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --ceut-blue: #3b4ba4; --ceut-gold: #f5b800; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000b21; 
            color: white; 
            min-height: 100vh;
            margin: 0;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            color: white; width: 100%; outline: none;
            transition: all 0.3s;
        }
        .input-field:focus { border-color: var(--ceut-gold); background: rgba(255, 255, 255, 0.08); }
        
        #initial-loader {
            position: fixed;
            inset: 0;
            background: #000b21;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Cargador de Seguridad -->
    <div id="initial-loader">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-[10px] font-bold uppercase tracking-widest opacity-40">Verificando Conexión...</p>
        </div>
    </div>

    <!-- Pantalla de Login -->
    <div id="auth-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-[#000b21] p-6">
        <div class="text-center p-10 glass rounded-[3rem] max-w-sm w-full border-t-4 border-t-yellow-500 shadow-2xl">
            <img src="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="h-20 mx-auto mb-6 drop-shadow-lg" alt="CEUT Logo">
            <h2 class="text-xl font-black italic uppercase mb-2">Portal <span class="text-yellow-500">Alumno</span></h2>
            <p class="text-[10px] opacity-40 uppercase font-bold mb-8 tracking-widest">Credenciales Institucionales</p>
            
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Usuario / Correo" class="input-field">
                <input id="login-pass" type="password" placeholder="Contraseña" class="input-field">
                <button onclick="handleLogin()" id="btn-login" class="w-full bg-yellow-500 text-blue-950 font-black py-4 rounded-2xl uppercase text-xs hover:scale-[0.98] active:scale-95 transition-all">
                    Entrar al Sistema
                </button>
            </div>
            
            <div id="login-error" class="mt-4 text-red-400 text-[10px] font-bold uppercase hidden"></div>

            <button onclick="window.location.href='index.html'" class="mt-8 text-[9px] opacity-40 uppercase font-bold hover:text-yellow-500 transition-colors block w-full">
                Volver al Inicio
            </button>
        </div>
    </div>

    <!-- Panel del Alumno -->
    <div id="main-content" class="hidden flex-1 p-6 lg:p-12 max-w-6xl mx-auto w-full">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-5">
                <img src="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="h-12" alt="CEUT">
                <div class="h-8 w-px bg-white/10"></div>
                <div>
                    <h1 id="user-display-name" class="font-black italic uppercase text-xl leading-none">...</h1>
                    <p class="text-[9px] opacity-40 uppercase font-bold tracking-widest mt-1">Portal del Estudiante</p>
                </div>
            </div>
            <button onclick="logout()" class="glass p-3 rounded-2xl text-red-400 hover:bg-red-500/10 transition-colors">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass p-8 rounded-[2.5rem] relative overflow-hidden">
                <i data-lucide="id-card" class="w-8 h-8 text-yellow-500 mb-12"></i>
                <h3 class="text-3xl font-black italic uppercase mb-2">Mi Credencial</h3>
                <p class="text-[10px] opacity-40 uppercase font-bold">Identificación Digital</p>
            </div>
            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-t-yellow-500">
                <i data-lucide="calendar-check" class="w-8 h-8 text-yellow-500 mb-12"></i>
                <h3 class="text-3xl font-black italic uppercase mb-2">Asistencias</h3>
                <p class="text-[10px] opacity-40 uppercase font-bold mb-4">Registro Académico</p>
                <button class="bg-white text-blue-950 px-6 py-2 rounded-xl text-[10px] font-black uppercase">Ver más</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ceut-system';

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-login');
            
            if(!email || !pass) return;

            btn.disabled = true;
            btn.innerText = "ACCEDIENDO...";

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch(e) {
                const errDiv = document.getElementById('login-error');
                errDiv.innerText = "Credenciales incorrectas";
                errDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "ENTRAR AL PORTAL";
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            // Eliminar cargador
            document.getElementById('initial-loader').style.display = 'none';

            const authScreen = document.getElementById('auth-screen');
            const mainContent = document.getElementById('main-content');

            if (user) {
                authScreen.classList.add('hidden');
                mainContent.classList.remove('hidden');
                
                try {
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                    document.getElementById('user-display-name').innerText = snap.exists() ? snap.data().name : user.email.split('@')[0];
                } catch(e) {
                    document.getElementById('user-display-name').innerText = "ALUMNO CEUT";
                }
            } else {
                mainContent.classList.add('hidden');
                authScreen.classList.remove('hidden');
            }
            lucide.createIcons();
        });

        // Fallback: si Firebase no responde en 4 segundos, mostrar login
        setTimeout(() => {
            const loader = document.getElementById('initial-loader');
            if(loader && loader.style.display !== 'none') {
                loader.style.display = 'none';
                document.getElementById('auth-screen').classList.remove('hidden');
                lucide.createIcons();
            }
        }, 4000);
    </script>
</body>
</html>
