<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEUT | Portal del Alumno</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --ceut-blue: #3b4ba4; --ceut-gold: #f5b800; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000b21; 
            color: white; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            color: white; width: 100%; outline: none;
            transition: all 0.3s;
        }
        .input-field:focus { border-color: var(--ceut-gold); background: rgba(255, 255, 255, 0.1); }
        
        /* Animación suave para evitar el parpadeo */
        .page-transition { transition: opacity 0.5s ease; }
        .hidden-v { opacity: 0; pointer-events: none; visibility: hidden; position: absolute; }
        .visible-v { opacity: 1; pointer-events: auto; visibility: visible; position: relative; }
    </style>
</head>
<body>

    <!-- Pantalla de Carga Inicial -->
    <div id="loader" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#000b21]">
        <div class="text-center">
            <div class="w-10 h-10 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-40">Estableciendo Enlace...</p>
        </div>
    </div>

    <!-- Interfaz de Acceso (Login) -->
    <div id="auth-screen" class="hidden-v flex-1 flex items-center justify-center p-6 page-transition">
        <div class="text-center p-10 glass rounded-[3rem] max-w-sm w-full border-t-4 border-t-yellow-500 shadow-2xl">
            <img src="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="h-24 mx-auto mb-8 drop-shadow-2xl" alt="CEUT Logo">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-2">Portal <span class="text-yellow-500">Alumno</span></h2>
            <p class="text-[10px] opacity-40 uppercase font-bold mb-10 tracking-[0.2em]">Acceso con Cuenta Institucional</p>
            
            <div class="space-y-4">
                <div class="text-left">
                    <label class="text-[9px] uppercase font-black opacity-30 ml-4 mb-1 block">Usuario / Correo</label>
                    <input id="login-email" type="email" class="input-field" placeholder="ejemplo@ceut.edu.mx">
                </div>
                <div class="text-left">
                    <label class="text-[9px] uppercase font-black opacity-30 ml-4 mb-1 block">Contraseña</label>
                    <input id="login-pass" type="password" class="input-field" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" id="btn-login" class="w-full bg-yellow-500 text-blue-950 font-black py-4 rounded-2xl uppercase text-xs hover:brightness-110 active:scale-95 transition-all mt-4 shadow-lg shadow-yellow-500/10">
                    Entrar al Sistema
                </button>
            </div>
            
            <div id="login-error" class="mt-6 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-[10px] font-bold uppercase hidden"></div>

            <button onclick="window.location.href='index.html'" class="mt-10 text-[9px] opacity-40 uppercase font-bold hover:text-white transition-colors flex items-center justify-center gap-2 mx-auto">
                <i data-lucide="arrow-left" class="w-3 h-3"></i> Volver al Inicio
            </button>
        </div>
    </div>

    <!-- Contenido Principal (Dashboard) -->
    <div id="main-content" class="hidden-v flex-1 p-6 lg:p-12 max-w-6xl mx-auto w-full page-transition">
        <header class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-6">
                <img src="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="h-14 drop-shadow-md" alt="CEUT">
                <div class="h-10 w-px bg-white/10 hidden sm:block"></div>
                <div>
                    <h1 id="user-display-name" class="font-black italic uppercase text-2xl leading-none tracking-tighter">...</h1>
                    <p class="text-[10px] opacity-40 uppercase font-bold tracking-[0.3em] mt-1 text-yellow-500">Alumno Verificado</p>
                </div>
            </div>
            <button onclick="logout()" class="glass p-4 rounded-[1.5rem] text-red-400 hover:bg-red-500/10 transition-all active:scale-90">
                <i data-lucide="power" class="w-6 h-6"></i>
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Card 1 -->
            <div class="glass p-10 rounded-[3rem] relative overflow-hidden group border-b-4 border-b-transparent hover:border-b-yellow-500 transition-all">
                <div class="flex justify-between items-start mb-16">
                    <div class="p-4 bg-yellow-500/10 rounded-2xl text-yellow-500">
                        <i data-lucide="id-card" class="w-8 h-8"></i>
                    </div>
                    <span class="text-[9px] font-black uppercase opacity-40 tracking-widest">Activo 2026</span>
                </div>
                <h3 class="text-4xl font-black italic uppercase mb-3">Mi Credencial</h3>
                <p class="text-xs opacity-40 uppercase font-bold leading-relaxed">Presenta este código en los puntos de acceso para registrar tu entrada.</p>
                <div class="absolute -right-8 -bottom-8 opacity-[0.03] group-hover:opacity-[0.06] transition-opacity">
                    <i data-lucide="id-card" class="w-48 h-48"></i>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="glass p-10 rounded-[3rem] relative overflow-hidden group border-b-4 border-b-transparent hover:border-b-yellow-500 transition-all">
                <div class="flex justify-between items-start mb-16">
                    <div class="p-4 bg-yellow-500/10 rounded-2xl text-yellow-500">
                        <i data-lucide="clock" class="w-8 h-8"></i>
                    </div>
                </div>
                <h3 class="text-4xl font-black italic uppercase mb-3">Asistencias</h3>
                <p class="text-xs opacity-40 uppercase font-bold mb-8">Revisa el historial de tus clases y registros de puntualidad.</p>
                <button class="bg-white text-blue-950 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-transform">Ver Historial</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Obtener configuración de forma segura
        const getConfig = () => {
            try { return JSON.parse(__firebase_config); }
            catch(e) { return null; }
        };

        const config = getConfig();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ceut-system';
        
        let auth, db;

        if (config) {
            const app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        // Lógica de UI
        const showAuth = () => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').classList.replace('visible-v', 'hidden-v');
            document.getElementById('auth-screen').classList.replace('hidden-v', 'visible-v');
            document.getElementById('auth-screen').classList.remove('hidden');
        };

        const showMain = () => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('auth-screen').classList.replace('visible-v', 'hidden-v');
            document.getElementById('main-content').classList.replace('hidden-v', 'visible-v');
            document.getElementById('main-content').classList.remove('hidden');
        };

        // Acciones globales
        window.handleLogin = async () => {
            if (!auth) return alert("Error de conexión con el servidor.");
            
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('login-error');
            
            if(!email || !pass) return;

            btn.disabled = true;
            btn.innerText = "VERIFICANDO...";
            err.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch(e) {
                err.innerText = "Usuario o contraseña incorrectos";
                err.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "ENTRAR AL PORTAL";
            }
        };

        window.logout = () => auth && signOut(auth);

        // Listener de sesión
        if (auth) {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    try {
                        const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                        document.getElementById('user-display-name').innerText = snap.exists() ? snap.data().name : user.email.split('@')[0].toUpperCase();
                    } catch(e) {
                        document.getElementById('user-display-name').innerText = "ALUMNO CEUT";
                    }
                    showMain();
                } else {
                    showAuth();
                }
                lucide.createIcons();
            });
        }

        // Seguridad: Si en 3 segundos no hay respuesta del sistema, forzar pantalla de login
        setTimeout(() => {
            if (document.getElementById('loader').style.display !== 'none') {
                showAuth();
                lucide.createIcons();
            }
        }, 3000);

        lucide.createIcons();
    </script>
</body>
</html>
