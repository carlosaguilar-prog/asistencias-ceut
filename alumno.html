<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEUT | Portal del Alumno</title>
    
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --ceut-navy: #020617;
            --ceut-blue: #1e3a8a;
            --ceut-gold: #f5b800;
        }

        body { 
            background: radial-gradient(circle at top right, #1e3a8a, #0f172a, #020617);
            background-attachment: fixed;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white; 
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Pantalla de carga persistente */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #020617;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-gold {
            background: var(--ceut-gold);
            color: var(--ceut-navy);
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-gold:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px -5px rgba(245, 184, 0, 0.4); 
        }

        .input-ceut {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            color: white;
            width: 100%;
            transition: all 0.3s;
        }

        .input-ceut:focus { 
            outline: none; 
            border-color: var(--ceut-gold); 
            background: rgba(255, 255, 255, 0.08);
        }

        /* Control de Vistas */
        .view-section { display: none; opacity: 0; transition: opacity 0.4s ease; }
        .view-active { display: flex !important; opacity: 1; }
        #main-content.view-active { display: block !important; }

        @keyframes spin-custom {
            to { transform: rotate(360deg); }
        }
        .loader-ring {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(245, 184, 0, 0.1);
            border-top-color: var(--ceut-gold);
            border-radius: 50%;
            animation: spin-custom 0.8s linear infinite;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Overlay de Carga -->
    <div id="loading-overlay">
        <div class="text-center">
            <div class="loader-ring mx-auto mb-4"></div>
            <p class="text-[10px] font-black uppercase tracking-[0.3em] opacity-40">Verificando Acceso</p>
        </div>
    </div>

    <!-- Pantalla de Login -->
    <div id="auth-screen" class="view-section flex-1 items-center justify-center p-6">
        <div class="glass-card p-10 md:p-16 rounded-[4rem] w-full max-w-lg shadow-2xl border-t-4 border-t-yellow-500">
            <img src="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="h-12 mx-auto mb-8 drop-shadow-lg" alt="CEUT Logo">
            
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Portal <span class="text-yellow-500">Alumno</span></h2>
                <p class="text-[10px] opacity-40 uppercase font-bold tracking-widest mt-2">Acceso Institucional Único</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[9px] uppercase font-black opacity-30 ml-4 mb-1 block">Correo Institucional</label>
                    <input id="login-email" type="email" class="input-ceut" placeholder="ejemplo@ceut.edu.mx">
                </div>
                <div>
                    <label class="text-[9px] uppercase font-black opacity-30 ml-4 mb-1 block">Contraseña</label>
                    <input id="login-pass" type="password" class="input-ceut" placeholder="••••••••">
                </div>
                <button onclick="window.handleLogin()" id="btn-login" class="btn-gold w-full py-5 rounded-2xl uppercase italic font-black text-xs">
                    Entrar al Sistema
                </button>
            </div>
            
            <div id="login-error" class="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-[10px] font-bold uppercase text-center hidden"></div>

            <div class="mt-10 pt-8 border-t border-white/5 space-y-4 text-center">
                <p class="text-[10px] opacity-40 font-bold uppercase">
                    ¿No tienes cuenta? 
                    <button onclick="window.showRegister()" class="text-yellow-500 underline ml-1 font-black">Regístrate por única ocasión</button>
                </p>
            </div>
        </div>
    </div>

    <!-- Pantalla de Registro -->
    <div id="register-screen" class="view-section flex-1 items-center justify-center p-6">
        <div class="glass-card p-10 md:p-16 rounded-[4rem] w-full max-w-lg shadow-2xl border-t-4 border-t-yellow-500">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Nuevo <span class="text-yellow-500">Registro</span></h2>
                <p class="text-[10px] opacity-40 uppercase font-bold tracking-widest mt-2">Alumno Pre-inscrito</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] uppercase font-black opacity-30 ml-4 mb-1 block">Nombre Completo</label>
                    <input id="reg-name" type="text" class="input-ceut uppercase" placeholder="JUAN PÉREZ LÓPEZ">
                </div>
                <div>
                    <label class="text-[9px] uppercase font-black opacity-30 ml-4 mb-1 block">Correo Institucional</label>
                    <input id="reg-email" type="email" class="input-ceut" placeholder="alumno@ceut.edu.mx">
                </div>
                <div>
                    <label class="text-[9px] uppercase font-black opacity-30 ml-4 mb-1 block">Crear Contraseña</label>
                    <input id="reg-pass" type="password" class="input-ceut" placeholder="Mínimo 6 caracteres">
                </div>
                <button onclick="window.handleRegister()" id="btn-register" class="btn-gold w-full py-5 rounded-2xl uppercase italic font-black text-xs mt-4">
                    Completar Registro Único
                </button>
            </div>
            
            <button onclick="window.showLogin()" class="mt-8 text-[9px] opacity-40 uppercase font-bold hover:text-white flex items-center justify-center gap-2 mx-auto">
                <i data-lucide="arrow-left" class="w-3 h-3"></i> Volver al Login
            </button>
        </div>
    </div>

    <!-- Dashboard Principal -->
    <div id="main-content" class="view-section flex-1 p-6 lg:p-12 max-w-6xl mx-auto w-full">
        <header class="glass-card p-8 rounded-[3rem] flex justify-between items-center mb-12 border-white/5">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 bg-yellow-500/10 rounded-2xl flex items-center justify-center border border-yellow-500/20">
                    <i data-lucide="graduation-cap" class="text-yellow-500 w-8 h-8"></i>
                </div>
                <div>
                    <h1 id="user-display-name" class="text-2xl font-black italic uppercase tracking-tighter leading-none">ALUMNO</h1>
                    <p class="text-[10px] opacity-40 uppercase font-bold tracking-[0.3em] mt-1 text-yellow-500">Estudiante Verificado</p>
                </div>
            </div>
            <button onclick="window.logout()" class="bg-white/5 border border-white/10 p-4 rounded-[1.5rem] text-red-400 hover:bg-red-500/20 transition-all">
                <i data-lucide="power" class="w-6 h-6"></i>
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Credencial -->
            <div class="glass-card p-10 rounded-[3.5rem] relative overflow-hidden group border-white/5 hover:border-yellow-500/30 transition-all duration-500">
                <div class="flex justify-between items-start mb-16">
                    <div class="p-4 bg-yellow-500/10 rounded-2xl text-yellow-500">
                        <i data-lucide="id-card" class="w-8 h-8"></i>
                    </div>
                </div>
                <h3 class="text-4xl font-black italic uppercase mb-3 leading-none">Mi Credencial</h3>
                <p class="text-xs opacity-40 uppercase font-bold leading-relaxed max-w-[250px]">Acceso digital dinámico.</p>
                <div class="absolute -right-8 -bottom-8 opacity-[0.03] group-hover:opacity-[0.06] transition-opacity">
                    <i data-lucide="id-card" class="w-56 h-56"></i>
                </div>
            </div>

            <!-- Asistencias -->
            <div class="glass-card p-10 rounded-[3.5rem] relative overflow-hidden group border-white/5 hover:border-yellow-500/30 transition-all duration-500">
                <div class="flex justify-between items-start mb-16">
                    <div class="p-4 bg-yellow-500/10 rounded-2xl text-yellow-500">
                        <i data-lucide="calendar-check-2" class="w-8 h-8"></i>
                    </div>
                </div>
                <h3 class="text-4xl font-black italic uppercase mb-3 leading-none">Asistencias</h3>
                <p class="text-xs opacity-40 uppercase font-bold mb-8 leading-relaxed">Registro de puntualidad.</p>
                <button class="btn-gold px-8 py-4 rounded-2xl text-[10px] font-black uppercase italic">Consultar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCefP6qEqaCMpo8ZpUiLpN4e_-E4ZNTp94",
            authDomain: "asistencias-ceut.firebaseapp.com",
            projectId: "asistencias-ceut",
            storageBucket: "asistencias-ceut.firebasestorage.app",
            messagingSenderId: "130615246146",
            appId: "1:130615246146:web:6ae2c17c828fb28a809cdb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "ceut-prod";

        const overlay = document.getElementById('loading-overlay');
        const sections = {
            auth: document.getElementById('auth-screen'),
            reg: document.getElementById('register-screen'),
            main: document.getElementById('main-content')
        };

        function switchView(viewName) {
            // Ocultar todas las secciones
            Object.values(sections).forEach(s => s.classList.remove('view-active'));
            // Mostrar la sección solicitada
            sections[viewName].classList.add('view-active');
            // Ocultar overlay de carga
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
            lucide.createIcons();
        }

        // Observador de estado de autenticación
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                    if(snap.exists()) {
                        document.getElementById('user-display-name').innerText = snap.data().name;
                    } else {
                        document.getElementById('user-display-name').innerText = user.email.split('@')[0].toUpperCase();
                    }
                    switchView('main');
                } catch(e) { 
                    switchView('main'); 
                }
            } else {
                switchView('auth');
            }
        });

        // Funciones globales para botones
        window.showRegister = () => {
            Object.values(sections).forEach(s => s.classList.remove('view-active'));
            sections.reg.classList.add('view-active');
            lucide.createIcons();
        };

        window.showLogin = () => {
            Object.values(sections).forEach(s => s.classList.remove('view-active'));
            sections.auth.classList.add('view-active');
            lucide.createIcons();
        };

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('login-error');

            if(!email || !pass) return;
            
            btn.disabled = true; btn.innerText = "ACCEDIENDO...";
            err.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch(e) {
                err.innerText = "ERROR: CORREO O CONTRASEÑA INCORRECTOS";
                err.classList.remove('hidden');
                btn.disabled = false; btn.innerText = "ENTRAR AL SISTEMA";
            }
        };

        window.handleRegister = async () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const btn = document.getElementById('btn-register');

            if(!name || !email || !pass) {
                alert("Por favor, completa todos los campos requeridos.");
                return;
            }
            
            if(pass.length < 6) {
                alert("La contraseña debe tener al menos 6 caracteres.");
                return;
            }

            btn.disabled = true; btn.innerText = "REGISTRANDO...";

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                // Guardar perfil del alumno
                await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'data'), {
                    name: name.toUpperCase(),
                    email: email,
                    role: 'ALUMNO',
                    createdAt: Date.now()
                });
                // El observador onAuthStateChanged detectará el login y hará el switchView automáticamente
            } catch(e) {
                alert("Error al registrar: " + e.message);
                btn.disabled = false; btn.innerText = "COMPLETAR REGISTRO ÚNICO";
            }
        };

        window.logout = () => {
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';
            signOut(auth);
        };

        lucide.createIcons();
    </script>
</body>
</html>
