<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEUT | Portal Estudiante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { 
            --ceut-navy: #020617;
            --ceut-blue: #1e3a8a;
            --ceut-gold: #f5b800;
        }

        body { 
            background: radial-gradient(circle at top right, #1e3a8a, #0f172a, #020617);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-gold {
            background: var(--ceut-gold);
            color: var(--ceut-navy);
            font-weight: 800;
            transition: all 0.3s ease;
        }

        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(245, 184, 0, 0.4); }

        .input-ceut {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 0.875rem;
            width: 100%;
        }

        .input-ceut:focus { outline: none; border-color: var(--ceut-gold); }
        
        select.input-ceut option { background: #0f172a; color: white; }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 8px;
            font-weight: 900;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 184, 0, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(245, 184, 0, 0); }
        }
        .pulse-effect { animation: pulse-gold 2s infinite; }

        .geo-indicator {
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app-container" class="max-w-md mx-auto">
        <!-- Loading -->
        <div id="loading-screen" class="fixed inset-0 flex items-center justify-center z-[100] bg-slate-950">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            </div>
        </div>

        <!-- Auth/Registro -->
        <div id="auth-screen" class="hidden py-10">
            <div class="glass-card p-10 rounded-[3rem] text-center">
                <img src="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="h-16 mx-auto mb-6">
                <h2 id="auth-title" class="text-2xl font-black italic uppercase tracking-tighter mb-8">Portal <span class="text-yellow-500">Alumno</span></h2>
                
                <!-- Login -->
                <div id="login-form" class="space-y-4">
                    <input id="login-email" type="email" placeholder="Correo Institucional" class="input-ceut">
                    <input id="login-pass" type="password" placeholder="Contraseña" class="input-ceut">
                    <button onclick="handleLogin()" class="btn-gold w-full py-4 rounded-2xl uppercase italic font-black text-xs">Ingresar</button>
                    <p class="text-[10px] font-bold opacity-40 uppercase">¿No tienes cuenta? <button onclick="toggleAuth(true)" class="text-yellow-500 underline">Regístrate</button></p>
                </div>

                <!-- Registro -->
                <div id="register-form" class="hidden space-y-4 text-left">
                    <input id="reg-name" type="text" placeholder="Nombre Completo" class="input-ceut">
                    <input id="reg-email" type="email" placeholder="Correo Institucional" class="input-ceut">
                    <input id="reg-pass" type="password" placeholder="Contraseña (min. 6)" class="input-ceut">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <input id="reg-grade" type="text" placeholder="Grado/Grupo" class="input-ceut uppercase">
                        <select id="reg-level" class="input-ceut uppercase font-bold" onchange="checkCareer()">
                            <option value="PREPARATORIA">PREPARATORIA</option>
                            <option value="LICENCIATURA">LICENCIATURA</option>
                            <option value="MAESTRIA">MAESTRÍA</option>
                        </select>
                    </div>
                    
                    <select id="reg-mod" class="input-ceut uppercase font-bold">
                        <option value="ESCOLARIZADA">ESCOLARIZADA</option>
                        <option value="MIXTA">MIXTA</option>
                    </select>

                    <input id="reg-career" type="text" placeholder="Carrera (si aplica)" class="input-ceut uppercase hidden">

                    <button onclick="handleRegister()" class="btn-gold w-full py-4 rounded-2xl uppercase italic font-black text-xs mt-4">Crear Perfil Único</button>
                    <button onclick="toggleAuth(false)" class="w-full text-[10px] font-bold opacity-40 uppercase text-center">Regresar al Inicio</button>
                </div>
            </div>
        </div>

        <!-- Dashboard Alumno -->
        <div id="main-dashboard" class="hidden space-y-6">
            <header class="glass-card p-6 rounded-[2.5rem] flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/10">
                        <i data-lucide="user" class="text-yellow-500 w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 id="user-display-name" class="text-sm font-black italic uppercase leading-none">ALUMNO</h1>
                        <p id="user-display-folio" class="text-[8px] font-bold text-yellow-500 uppercase mt-1 tracking-widest">FOLIO: ---</p>
                    </div>
                </div>
                <button onclick="handleLogout()" class="p-3 bg-white/5 rounded-xl border border-white/10 text-red-400">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </header>

            <!-- Pase de Lista -->
            <div class="glass-card p-8 rounded-[3rem] text-center">
                <p class="text-[9px] font-black uppercase tracking-[0.3em] opacity-40 mb-6">Registro de Asistencia</p>
                <div class="flex gap-2 mb-6">
                    <input id="attendance-code" type="tel" maxlength="6" placeholder="CÓDIGO" class="input-ceut text-center text-xl font-black tracking-[0.5em] h-16">
                    <button id="verify-btn" onclick="verifyCode()" class="btn-gold px-6 rounded-2xl transition-all duration-300">
                        <i data-lucide="search"></i>
                    </button>
                </div>

                <!-- Info Clase Encontrada -->
                <div id="class-preview" class="hidden bg-white/5 border border-white/10 p-6 rounded-3xl mb-6 text-left animate-in fade-in duration-500">
                    <p class="text-[7px] font-black uppercase text-yellow-500 tracking-widest mb-1">CLASE DETECTADA</p>
                    <h3 id="prev-materia" class="text-lg font-black italic uppercase leading-none mb-1">---</h3>
                    <p id="prev-profesor" class="text-[9px] font-bold opacity-40 uppercase mb-4">PROFESOR: ---</p>
                    
                    <div id="geo-status-container" class="mb-6">
                        <!-- Indicador de Geo se inyecta aquí -->
                    </div>

                    <button id="submit-btn" onclick="submitAttendance()" class="btn-gold w-full py-4 rounded-xl text-[10px] font-black uppercase italic pulse-effect disabled:opacity-50 disabled:grayscale">
                        Confirmar Asistencia
                    </button>
                </div>
            </div>

            <!-- Historial -->
            <div class="glass-card p-8 rounded-[3rem]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-[9px] font-black uppercase italic opacity-40 tracking-widest">Mis Asistencias</h3>
                    <button onclick="exportHistoryPDF()" class="text-[8px] font-black uppercase text-yellow-500 border border-yellow-500/20 px-3 py-1 rounded-lg">Exportar PDF</button>
                </div>
                <div id="history-list" class="space-y-3">
                    <p class="text-center py-10 opacity-20 text-[9px] uppercase font-black">Sin registros previos</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ceut-prod';

        let currentUser = null;
        let userData = null;
        let activeClassId = null;
        let activeClassData = null;
        let attendanceHistory = [];

        // Inicialización Auth
        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loading-screen').classList.add('hidden');
            if (user) {
                currentUser = user;
                const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                if (snap.exists()) {
                    userData = snap.data();
                    showDashboard();
                }
            } else {
                showAuth();
            }
        });

        // UI Toggles
        window.toggleAuth = (isReg) => {
            document.getElementById('login-form').classList.toggle('hidden', isReg);
            document.getElementById('register-form').classList.toggle('hidden', !isReg);
            document.getElementById('auth-title').innerHTML = isReg ? `Registro <span class="text-yellow-500">Único</span>` : `Portal <span class="text-yellow-500">Alumno</span>`;
        };

        window.checkCareer = () => {
            const level = document.getElementById('reg-level').value;
            document.getElementById('reg-career').classList.toggle('hidden', level === 'PREPARATORIA');
        };

        // Handlers
        window.handleRegister = async () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const grade = document.getElementById('reg-grade').value;
            const level = document.getElementById('reg-level').value;
            const mod = document.getElementById('reg-mod').value;
            const career = document.getElementById('reg-career').value;

            if(!name || !email || pass.length < 6) return alert("Verifica los datos. Contraseña min 6 caracteres.");

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                const folio = "CEUT-ALU-" + Math.floor(1000 + Math.random() * 9000);
                const profile = {
                    name: name.toUpperCase(),
                    email, grade: grade.toUpperCase(), level, mod,
                    career: career.toUpperCase() || 'N/A',
                    folio, ts: Date.now()
                };
                await setDoc(doc(db, 'artifacts', appId, 'users', cred.user.uid, 'profile', 'data'), profile);
                userData = profile;
                showDashboard();
            } catch (e) { alert("Error en el registro: " + e.message); }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert("Acceso incorrecto."); }
        };

        window.handleLogout = () => signOut(auth);

        function showDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = userData.name;
            document.getElementById('user-display-folio').innerText = `FOLIO: ${userData.folio}`;
            loadHistory();
            lucide.createIcons();
        }

        function showAuth() {
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
        }

        // LÓGICA DE ASISTENCIA Y GEOCERCA
        window.verifyCode = async () => {
            const code = document.getElementById('attendance-code').value;
            const btn = document.getElementById('verify-btn');
            if(code.length !== 6) return;

            btn.classList.add('opacity-50', 'pointer-events-none');
            
            const classesRef = collection(db, 'artifacts', appId, 'public', 'data', 'classes');
            // Nota: En un entorno real usamos query(classesRef, where('activeCode', '==', code)).
            // Siguiendo la REGLA 2, filtramos en memoria.
            onSnapshot(classesRef, (snap) => {
                const found = snap.docs.find(d => d.data().activeCode === code);
                btn.classList.remove('opacity-50', 'pointer-events-none');

                if(found) {
                    const data = found.data();
                    if(Date.now() > data.expiry) return alert("Este código ha expirado (20s). Solicita uno nuevo.");
                    
                    activeClassId = found.id;
                    activeClassData = data;
                    document.getElementById('prev-materia').innerText = data.name;
                    document.getElementById('prev-profesor').innerText = `PROFESOR: ${data.teacherName || 'DOCENTE CEUT'}`;
                    document.getElementById('class-preview').classList.remove('hidden');
                    
                    // Iniciamos verificación de geo inmediata
                    checkGeoStatus();
                } else {
                    alert("Código no reconocido o expirado.");
                }
            }, (err) => console.error(err));
        };

        function checkGeoStatus() {
            const container = document.getElementById('geo-status-container');
            const submitBtn = document.getElementById('submit-btn');
            
            container.innerHTML = `<div class="geo-indicator bg-white/5 border border-white/10 text-white/40"><i data-lucide="loader" class="w-3 h-3 animate-spin"></i> Validando Ubicación...</div>`;
            lucide.createIcons();

            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = getDistance(pos.coords.latitude, pos.coords.longitude, activeClassData.geo.lat, activeClassData.geo.lng);
                
                if(dist <= 80) {
                    container.innerHTML = `<div class="geo-indicator bg-green-500/10 border border-green-500/20 text-green-400"><i data-lucide="shield-check" class="w-3 h-3"></i> En el aula (${Math.round(dist)}m)</div>`;
                    submitBtn.disabled = false;
                } else {
                    container.innerHTML = `<div class="geo-indicator bg-red-500/10 border border-red-500/20 text-red-400"><i data-lucide="alert-circle" class="w-3 h-3"></i> Fuera de rango (${Math.round(dist)}m)</div>`;
                    submitBtn.disabled = true;
                }
                lucide.createIcons();
            }, () => {
                container.innerHTML = `<div class="geo-indicator bg-red-500/10 border border-red-500/20 text-red-400">GPS Desactivado</div>`;
                submitBtn.disabled = true;
                lucide.createIcons();
            });
        }

        window.submitAttendance = async () => {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Registrando...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'attendance'), {
                    classId: activeClassId,
                    className: activeClassData.name,
                    teacher: activeClassData.teacherName,
                    folio: userData.folio,
                    userName: userData.name,
                    userGrade: userData.grade,
                    userLevel: userData.level,
                    ts: Date.now()
                });

                alert("¡Asistencia registrada con éxito!");
                document.getElementById('class-preview').classList.add('hidden');
                document.getElementById('attendance-code').value = "";
            } catch (e) {
                alert("Error al registrar. Intenta de nuevo.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Confirmar Asistencia";
            }
        };

        function loadHistory() {
            const histRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'attendance');
            onSnapshot(histRef, (snap) => {
                attendanceHistory = snap.docs.map(d => d.data());
                const container = document.getElementById('history-list');
                if(attendanceHistory.length === 0) return;
                
                container.innerHTML = "";
                attendanceHistory.sort((a,b) => b.ts - a.ts).forEach(h => {
                    const div = document.createElement('div');
                    div.className = "p-4 bg-white/5 border border-white/5 rounded-2xl flex justify-between items-center";
                    div.innerHTML = `
                        <div>
                            <h4 class="font-black text-[10px] uppercase italic">${h.className}</h4>
                            <p class="text-[7px] opacity-40 uppercase font-bold mt-1">${new Date(h.ts).toLocaleString()}</p>
                        </div>
                        <div class="status-badge">PRESENTE</div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        // FÓRMULA HAVERSINE PARA DISTANCIA
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Radio de la Tierra en metros
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        window.exportHistoryPDF = () => {
            if(!attendanceHistory.length) return;
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF();
            
            docPdf.setFillColor(2, 6, 23);
            docPdf.rect(0, 0, 210, 45, 'F');
            docPdf.setTextColor(255, 255, 255);
            docPdf.setFontSize(22);
            docPdf.text("CEUT UNIVERSIDAD", 15, 25);
            docPdf.setFontSize(9);
            docPdf.text("REPORTE INDIVIDUAL DE ASISTENCIAS", 15, 35);
            
            docPdf.setTextColor(20, 20, 20);
            docPdf.setFontSize(10);
            docPdf.text(`ESTUDIANTE: ${userData.name}`, 15, 60);
            docPdf.text(`FOLIO: ${userData.folio}`, 15, 65);
            docPdf.text(`NIVEL: ${userData.level} | GRUPO: ${userData.grade}`, 15, 70);

            const body = attendanceHistory.map(h => [
                h.className,
                h.teacher,
                new Date(h.ts).toLocaleDateString(),
                new Date(h.ts).toLocaleTimeString(),
                'PRESENTE'
            ]);

            docPdf.autoTable({
                startY: 80,
                head: [['MATERIA', 'PROFESOR', 'FECHA', 'HORA', 'ESTADO']],
                body: body,
                headStyles: { fillColor: [30, 58, 138], fontStyle: 'bold' },
                styles: { fontSize: 8, cellPadding: 4, halign: 'center' },
                alternateRowStyles: { fillColor: [245, 247, 250] }
            });

            docPdf.save(`Asistencias_CEUT_${userData.folio}.pdf`);
        };

        lucide.createIcons();
    </script>
</body>
</html>
