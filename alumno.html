<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEUT | Portal Estudiante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Librería para leer QR desde la cámara -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --ceut-blue: #1e40af; --bg-slate: #f8fafc; }
        body { background-color: var(--bg-slate); font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .input-ceut { width: 100%; padding: 0.8rem 1rem; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 13px; font-weight: 600; background: white; transition: all 0.2s; }
        .input-ceut:focus { border-color: var(--ceut-blue); outline: none; }
        .btn-primary { background: var(--ceut-blue); color: white; padding: 1.1rem; border-radius: 20px; font-weight: 800; font-size: 11px; text-transform: uppercase; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 20px -5px rgba(30, 64, 175, 0.3); }
        .card-glass { background: white; border: 1px solid #e2e8e0; border-radius: 2.5rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; p: 0; }
            .card-glass { box-shadow: none; border: 1px solid #eee; }
        }
        .print-only { display: none; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-lg mx-auto">
        
        <!-- SECCIÓN DE AUTENTICACIÓN / REGISTRO ÚNICO -->
        <div id="auth-section" class="min-h-[80vh] flex items-center justify-center no-print">
            <div class="card-glass p-8 w-full text-center">
                <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-16 mx-auto mb-6" alt="Logo CEUT">
                <h2 class="text-xl font-black italic mb-2 uppercase tracking-tighter">Portal Estudiante</h2>
                <p class="text-[10px] font-bold text-slate-400 mb-8 uppercase tracking-widest">Validación de Asistencia Cloud</p>
                
                <div class="space-y-3 text-left">
                    <input type="email" id="email" placeholder="Correo Institucional" class="input-ceut">
                    <input type="password" id="pass" placeholder="Contraseña" class="input-ceut">
                    
                    <div id="reg-fields" class="hidden space-y-3 pt-4 border-t border-slate-100">
                        <input type="text" id="reg-name" placeholder="NOMBRE COMPLETO" class="input-ceut uppercase">
                        <input type="text" id="reg-matr" placeholder="MATRÍCULA" class="input-ceut uppercase">
                        <p class="text-[9px] text-blue-600 font-bold uppercase italic">* Registro único. Se te asignará un Folio CEUT.</p>
                    </div>

                    <button id="login-btn" class="btn-primary w-full mt-4">Acceder al Sistema</button>
                    <button onclick="toggleReg()" id="toggle-text" class="w-full text-[10px] font-black text-slate-400 uppercase mt-4">¿No tienes cuenta? Regístrate aquí</button>
                </div>
            </div>
        </div>

        <!-- DASHBOARD PRINCIPAL -->
        <div id="dashboard" class="hidden">
            <header class="flex justify-between items-center mb-8 no-print">
                <div>
                    <h1 id="std-name" class="text-lg font-black italic uppercase text-slate-900 leading-none mb-1">Cargando...</h1>
                    <span id="std-folio" class="text-blue-600 text-[10px] font-black uppercase tracking-widest italic">FOLIO: ---</span>
                </div>
                <button onclick="logout()" class="text-rose-500 bg-rose-50 p-3 rounded-2xl"><i data-lucide="log-out"></i></button>
            </header>

            <!-- REGISTRO DE ASISTENCIA (QR/CÓDIGO) -->
            <div id="action-card" class="card-glass p-8 mb-6 border-t-4 border-blue-600 no-print">
                <div id="step-1">
                    <h3 class="text-[10px] font-black text-slate-900 mb-4 uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="scan" class="w-4 h-4 text-blue-600"></i> Escanear o Ingresar Código
                    </h3>
                    
                    <div id="reader" class="mb-4"></div>
                    
                    <div class="flex gap-2">
                        <input type="text" id="joinId" placeholder="CÓDIGO NUMÉRICO (OTP)" class="input-ceut uppercase">
                        <button onclick="manualLoad()" class="bg-slate-900 text-white px-4 rounded-2xl font-black text-[10px] uppercase transition-all">Validar</button>
                    </div>
                </div>

                <!-- PRECARGA DE DATOS (Se muestra tras leer QR/Código) -->
                <div id="step-2" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="bg-blue-50 p-4 rounded-2xl mb-4 border border-blue-100">
                        <p class="text-[8px] font-black text-blue-600 uppercase mb-1 tracking-widest">Clase Detectada</p>
                        <h4 id="pre-class-name" class="font-black text-lg italic uppercase text-slate-900">---</h4>
                        <p id="pre-teacher-name" class="text-[10px] font-bold text-slate-500 uppercase">PROF: ---</p>
                    </div>
                    <button id="reg-action-btn" onclick="confirmAttendance()" class="btn-primary w-full">
                        Registrar Asistencia Ahora
                    </button>
                    <button onclick="resetSteps()" class="w-full text-[9px] font-bold text-slate-400 uppercase mt-4 italic">Cancelar / Volver a escanear</button>
                </div>
            </div>

            <!-- HISTORIAL -->
            <div class="card-glass p-8">
                <div class="flex justify-between items-center mb-6 no-print">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Mis Asistencias Validadas</h3>
                </div>
                
                <div class="print-only mb-8 text-center border-b pb-6">
                    <h1 class="text-2xl font-black uppercase italic">Comprobante CEUT</h1>
                    <p class="text-sm font-bold text-slate-600 uppercase" id="print-date"></p>
                    <p class="text-xs mt-2 uppercase font-bold" id="print-student-info"></p>
                </div>

                <div id="history" class="space-y-3">
                    <div class="text-center py-10 text-slate-300 italic text-xs uppercase font-bold">Sin registros</div>
                </div>

                <div class="mt-8 pt-6 border-t border-dashed border-slate-200 no-print">
                    <button onclick="window.print()" class="w-full py-4 border-2 border-slate-100 rounded-2xl text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center justify-center gap-3">
                        <i data-lucide="printer" class="w-4 h-4"></i> Imprimir Comprobante
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCefP6qEqaCMpo8ZpUiLpN4e_-E4ZNTp94",
            authDomain: "asistencias-ceut.firebaseapp.com",
            projectId: "asistencias-ceut",
            storageBucket: "asistencias-ceut.firebasestorage.app",
            messagingSenderId: "130615246146",
            appId: "1:130615246146:web:6ae2c17c828fb28a809cdb"
        };

        const appId = 'ceut_asistencias_v1';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userProfile = null;
        let isReg = false;
        let selectedClass = null;
        let scanner = null;

        const generateFolio = () => `CEUT-STD-${Math.floor(100000 + Math.random() * 900000)}`;
        const getLoc = () => new Promise((res, rej) => navigator.geolocation.getCurrentPosition(p => res({lat: p.coords.latitude, lng: p.coords.longitude}), e => rej(e), {enableHighAccuracy: true}));
        const calcDist = (p1, p2) => {
            const R = 6371e3;
            const dLat = (p2.lat-p1.lat) * Math.PI/180;
            const dLon = (p2.lng-p1.lng) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat * Math.PI/180) * Math.cos(p2.lat * Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        window.toggleReg = () => {
            isReg = !isReg;
            document.getElementById('reg-fields').classList.toggle('hidden');
            document.getElementById('login-btn').innerText = isReg ? "Crear Perfil Único" : "Acceder al Sistema";
            document.getElementById('toggle-text').innerText = isReg ? "¿Ya tienes cuenta? Entra aquí" : "¿No tienes cuenta? Regístrate aquí";
        };

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'));
                if(snap.exists() && snap.data().role === 'student') {
                    userProfile = snap.data();
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('std-name').innerText = userProfile.name;
                    document.getElementById('std-folio').innerText = `FOLIO: ${userProfile.folio}`;
                    document.getElementById('print-student-info').innerText = `Alumno: ${userProfile.name} | Folio: ${userProfile.folio}`;
                    initScanner();
                    onSnapshot(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'), s => {
                        if(s.exists()) renderHistory(s.data().asistencias);
                    });
                } else if(snap.exists()) {
                    alert("Acceso denegado: Use el portal de maestros.");
                    signOut(auth);
                }
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
                if(scanner) scanner.clear();
            }
        });

        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Complete los campos");
            try {
                if(isReg) {
                    const name = document.getElementById('reg-name').value, matr = document.getElementById('reg-matr').value;
                    if(!name || !matr) return alert("Datos de registro incompletos");
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'info'), {
                        uid: res.user.uid, name: name.toUpperCase(), matrícula: matr.toUpperCase(), 
                        folio: generateFolio(), role: 'student', email, asistencias: [], createdAt: Date.now()
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch(e) { alert("Error: " + e.message); }
        };

        // Escaneo de QR
        function initScanner() {
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            scanner.render(async (text) => {
                try {
                    const data = JSON.parse(text);
                    if(data.classId) await loadClassData(data.classId);
                } catch(e) {
                    // Si no es JSON, intentamos leer como ID directo
                    await loadClassData(text);
                }
            });
        }

        // Carga manual por código numérico OTP
        window.manualLoad = async () => {
            const code = document.getElementById('joinId').value.trim();
            if(!code) return alert("Ingrese el código");
            
            // Buscar clase que tenga ese OTP activo
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'classes'), where("otp", "==", code), where("isOpen", "==", true));
            const snap = await getDocs(q);
            
            if(snap.empty) return alert("Código inválido o expirado. Solicite uno nuevo al maestro.");
            
            await loadClassData(snap.docs[0].id);
        };

        async function loadClassData(cid) {
            const s = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'classes', cid));
            if(!s.exists()) return alert("Clase no encontrada.");
            
            selectedClass = s.data();
            if(!selectedClass.isOpen) return alert("Esta sesión de clase ha sido cerrada.");

            document.getElementById('pre-class-name').innerText = selectedClass.name;
            document.getElementById('pre-teacher-name').innerText = `PROF: ${selectedClass.teacherName}`;
            
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            if(scanner) scanner.clear();
        }

        window.confirmAttendance = async () => {
            const btn = document.getElementById('reg-action-btn');
            btn.disabled = true;
            btn.innerText = "VALIDANDO GEOCERCA (80M)...";

            try {
                const loc = await getLoc();
                const dist = calcDist(loc, selectedClass.coords);

                if(dist > 80) {
                    btn.disabled = false;
                    btn.innerText = "REGISTRAR ASISTENCIA AHORA";
                    return alert(`Fuera de rango. Estás a ${Math.round(dist)}m. El límite es 80m.`);
                }

                if((userProfile.asistencias || []).includes(selectedClass.id)) {
                    btn.disabled = false;
                    btn.innerText = "REGISTRAR ASISTENCIA AHORA";
                    return alert("Ya registraste asistencia en esta sesión.");
                }

                await updateDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'profile', 'info'), { 
                    asistencias: arrayUnion(selectedClass.id) 
                });

                alert("¡Asistencia confirmada con éxito!");
                resetSteps();
            } catch(e) {
                alert("Error: Activa tu GPS y permite el acceso a la ubicación.");
                btn.disabled = false;
                btn.innerText = "REGISTRAR ASISTENCIA AHORA";
            }
        };

        window.resetSteps = () => {
            selectedClass = null;
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('joinId').value = "";
            initScanner();
        };

        async function renderHistory(ids) {
            const container = document.getElementById('history');
            if(!ids || ids.length === 0) return;
            let html = "";
            for(const id of [...ids].reverse()) {
                const s = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'classes', id));
                if(s.exists()) {
                    const c = s.data();
                    html += `
                        <div class="p-4 bg-white border border-slate-100 rounded-2xl flex justify-between items-center shadow-sm">
                            <div>
                                <h4 class="font-black text-xs uppercase italic text-slate-900">${c.name}</h4>
                                <p class="text-[8px] font-bold text-slate-400 uppercase mt-0.5">${new Date(c.createdAt).toLocaleDateString()}</p>
                            </div>
                            <span class="text-[9px] font-black text-green-600 bg-green-50 px-3 py-1 rounded-full uppercase italic">Válida</span>
                        </div>
                    `;
                }
            }
            container.innerHTML = html || `<div class="text-center py-10 text-slate-300 italic text-xs uppercase font-bold">Sin registros</div>`;
            lucide.createIcons();
        }

        window.logout = () => signOut(auth);
        lucide.createIcons();
    </script>
</body>
</html>
