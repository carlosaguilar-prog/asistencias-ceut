<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CEUT | GESTIÓN INTELIGENTE</title>
    
    <style>
        :root { 
            --bg-deep: #0f172a; 
            --accent-gold: #d4af37; 
            --ceutBlue: #1e40af;
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; 
            background-color: var(--bg-deep); 
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            color: white; width: 100%; height: 100%; overflow: hidden;
        }

        #app-container { height: 100%; width: 100%; overflow-y: auto; opacity: 0; transition: opacity 0.5s ease; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .view-section { display: none; width: 100%; min-height: 100%; flex-direction: column; }
        .view-section.active { display: flex; }

        #master-access-trigger {
            position: fixed; top: 25px; right: 25px; z-index: 9999;
            width: 50px; height: 50px; background: #1e293b; border-radius: 16px; 
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--accent-gold); 
            cursor: pointer; transition: all 0.3s;
        }

        .card-admin { background: white; border-radius: 1.5rem; padding: 1.5rem; color: #1e293b; margin-bottom: 1rem; border: 1px solid #e2e8f0; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-teacher { background: #dbeafe; color: #1e40af; }
        
        .action-btn { transition: all 0.2s; cursor: pointer; }
        .action-btn:active { transform: scale(0.95); }

        /* Animación de escaneo exitoso */
        @keyframes success-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background: #22c55e; }
            100% { transform: scale(1); }
        }
        .success-anim { animation: success-pulse 0.6s ease-out; }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div id="master-access-trigger" onclick="prepareAuth('admin')" class="no-print">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-[#0f172a] z-[9999] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-white/10 border-t-[#d4af37] rounded-full animate-spin mb-4"></div>
        <p id="loading-text" class="text-[10px] font-bold tracking-[0.3em] opacity-40 uppercase">Cargando Sistema</p>
    </div>

    <div id="app-container">
        <!-- HOME -->
        <main id="view-home" class="view-section active items-center justify-center p-6 text-center">
            <div class="max-w-md w-full">
                <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-24 mx-auto mb-6">
                <h1 class="text-4xl font-extrabold tracking-tighter mb-2">CEUT <span class="text-[#d4af37]">CLOUD</span></h1>
                <p class="text-[10px] tracking-[0.4em] text-white/40 font-bold uppercase mb-10">AUTO-REGISTRO QR</p>
                <div class="space-y-5">
                    <button onclick="prepareAuth('teacher')" class="w-full glass p-6 rounded-3xl flex items-center gap-5 action-btn">
                        <div class="w-16 h-16 bg-[#d4af37] rounded-2xl flex items-center justify-center text-3xl">👨‍🏫</div>
                        <div class="text-left"><p class="text-[14px] font-black uppercase">Docentes</p><p class="text-[10px] text-white/50">Gestionar Clases</p></div>
                    </button>
                    <button onclick="prepareAuth('student')" class="w-full bg-white p-6 rounded-3xl flex items-center gap-5 action-btn shadow-xl">
                        <div class="w-16 h-16 bg-[#1e40af] rounded-2xl flex items-center justify-center text-3xl text-white">🎓</div>
                        <div class="text-left"><p class="text-[14px] font-black text-[#1e40af] uppercase">Alumnos</p><p class="text-[10px] text-slate-400">Acceso Estudiantil</p></div>
                    </button>
                </div>
            </div>
        </main>

        <!-- AUTH -->
        <section id="view-auth" class="view-section p-6 bg-slate-50 items-center justify-center">
            <div class="w-full max-w-sm text-slate-800">
                <button onclick="switchView('home')" class="mb-8 text-[12px] font-bold text-slate-400 uppercase tracking-widest">← Inicio</button>
                <h2 id="auth-title" class="text-3xl font-black text-[#1e40af] mb-6 uppercase tracking-tighter">Acceso</h2>
                <div id="auth-mode-selector" class="flex bg-slate-200/50 p-1 rounded-2xl mb-6">
                    <button onclick="toggleAuthMode('login')" id="btn-mode-login" class="flex-1 py-4 rounded-xl font-bold text-[12px] uppercase bg-white shadow-sm">Ingresar</button>
                    <button onclick="toggleAuthMode('register')" id="btn-mode-register" class="flex-1 py-4 rounded-xl font-bold text-[12px] uppercase text-slate-400">Registrar</button>
                </div>
                <div class="space-y-4">
                    <div id="reg-fields" class="hidden space-y-4">
                        <input type="text" id="authName" placeholder="NOMBRE COMPLETO" class="w-full p-5 bg-white border-2 border-slate-200 rounded-2xl text-lg font-bold uppercase">
                        <input type="text" id="authId" placeholder="MATRÍCULA / ID" class="w-full p-5 bg-white border-2 border-slate-200 rounded-2xl text-lg font-bold uppercase">
                    </div>
                    <input type="email" id="authEmail" placeholder="CORREO" class="w-full p-5 bg-white border-2 border-slate-200 rounded-2xl text-lg font-bold">
                    <input type="password" id="authPass" placeholder="CONTRASEÑA" class="w-full p-5 bg-white border-2 border-slate-200 rounded-2xl text-lg font-bold">
                    <button onclick="handleAuth()" class="w-full bg-[#1e40af] text-white p-6 rounded-2xl font-black mt-4 uppercase text-[12px] tracking-widest shadow-xl action-btn">Confirmar Acceso</button>
                </div>
            </div>
        </section>

        <!-- PANEL ALUMNO -->
        <section id="view-student-panel" class="view-section bg-[#1e40af] p-6 items-center justify-center">
            <div id="student-card" class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border-2 border-white/10 transition-all">
                <div class="w-20 h-20 bg-white/10 rounded-3xl mx-auto mb-6 flex items-center justify-center text-4xl">🎓</div>
                <h2 class="text-2xl font-black text-white uppercase mb-1" id="std-nav-name">ESTUDIANTE</h2>
                <p class="text-[#d4af37] text-[10px] font-black uppercase tracking-widest mb-10" id="std-nav-id">MATRÍCULA: ---</p>
                
                <div id="status-area" class="space-y-6">
                    <p class="text-white/40 text-[10px] font-bold uppercase tracking-[0.2em]">Listo para registrar</p>
                    <input type="text" id="regCode" oninput="onCodeInput(this)" placeholder="CÓDIGO" class="w-full bg-white/10 border-4 border-white/20 p-6 text-center text-5xl font-black rounded-3xl outline-none text-white tracking-[0.2em]" maxlength="6">
                    <div id="class-detected-info" class="hidden bg-[#d4af37]/20 p-6 rounded-2xl border-2 border-[#d4af37]/30 animate-pulse">
                        <p id="det-course" class="text-[#d4af37] text-[12px] font-black uppercase"></p>
                    </div>
                    <button id="btn-register-attendance" onclick="studentRegister()" disabled class="w-full bg-white/10 text-white/20 p-6 rounded-2xl font-black text-[12px] uppercase">REGISTRAR ENTRADA</button>
                </div>
                <button onclick="logout()" class="mt-12 text-white/30 text-[10px] font-black uppercase underline">CERRAR SESIÓN</button>
            </div>
        </section>

        <!-- PANEL DOCENTE & ADMIN (REUTILIZADOS) -->
        <section id="view-admin-panel" class="view-section bg-slate-100">
            <nav class="bg-slate-900 p-5 flex justify-between items-center text-white sticky top-0 z-50">
                <span class="font-black text-[12px]">CEUT MASTER</span>
                <button onclick="logout()" class="bg-red-600 text-[10px] font-black px-4 py-2 rounded-xl">SALIR DEL SITIO</button>
            </nav>
            <div id="admin-content-sessions" class="p-5 space-y-4">
                <div id="global-sessions-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="view-teacher-panel" class="view-section bg-slate-100">
            <nav class="bg-[#1e40af] p-5 flex justify-between items-center text-white sticky top-0 z-50">
                <span id="nav-name" class="text-[12px] font-black uppercase">DOCENTE</span>
                <button onclick="logout()" class="text-[10px] font-black bg-white/10 px-4 py-2 rounded-xl">SALIR</button>
            </nav>
            <div class="p-6 space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-2 border-slate-100">
                    <input type="text" id="sCourse" placeholder="MATERIA" class="w-full p-5 bg-slate-50 rounded-2xl text-lg font-black border-2 border-slate-100 uppercase mb-4">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <input type="text" id="sGrade" placeholder="GRUPO" class="w-full p-5 bg-slate-50 rounded-2xl text-lg font-black border-2 border-slate-100 uppercase">
                        <select id="sLevel" class="w-full p-5 bg-slate-50 rounded-2xl text-[12px] font-black">
                            <option value="LIC">LICENCIATURA</option>
                            <option value="BAC">BACHILLERATO</option>
                        </select>
                    </div>
                    <button onclick="saveClass()" class="w-full bg-[#d4af37] text-[#1e40af] p-6 rounded-3xl font-black text-[12px] uppercase">ACTIVAR PASE DE LISTA</button>
                </div>
                <div id="sessions-list" class="space-y-4 pb-20"></div>
            </div>
        </section>
    </div>

    <!-- MODAL QR (URL DINÁMICA) -->
    <div id="qr-modal" class="fixed inset-0 bg-[#0f172a]/98 backdrop-blur-2xl z-[200] hidden flex flex-col items-center justify-center p-8">
        <div id="qrcode-box" class="p-8 bg-white rounded-[3rem] shadow-2xl mb-8 border-8 border-[#d4af37]"></div>
        <h4 id="modal-code" class="text-7xl font-black text-white tracking-tighter mb-4">000000</h4>
        <p id="modal-course-name" class="text-[#d4af37] font-black uppercase tracking-widest text-sm mb-6">MATERIA</p>
        <p class="text-white/30 text-[9px] uppercase tracking-widest mb-10">Escanea para registro directo</p>
        <button onclick="closeQR()" class="bg-white text-[#1e40af] w-full max-w-sm py-6 rounded-3xl font-black text-[14px] uppercase">Cerrar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCefP6qEqaCMpo8ZpUiLpN4e_-E4ZNTp94",
            authDomain: "asistencias-ceut.firebaseapp.com",
            projectId: "asistencias-ceut",
            storageBucket: "asistencias-ceut.firebasestorage.app",
            appId: "1:130615246146:web:6ae2c17c828fb28a809cdb"
        };

        const APP_ID = "ceut-cloud-v10";
        const ADMIN_EMAIL = "carlos.aguilar@ceut.edu.mx";
        let db, auth, currentUser, userData;

        // --- DETECCIÓN DE DEEP LINK (CÓDIGO EN URL) ---
        function getCodeFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('c'); // Ejemplo: ?c=123456
        }

        async function init() {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            const directCode = getCodeFromURL();

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    const p = await getDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'info'));
                    
                    if (user.email === ADMIN_EMAIL) {
                        userData = { name: "CARLOS AGUILAR", role: "admin" };
                        switchView('admin-panel');
                        initAdminMonitoring();
                    } else if (p.exists()) {
                        userData = p.data();
                        if (userData.role === 'teacher') {
                            switchView('teacher-panel');
                            listenToTeacherSessions(user.uid);
                            document.getElementById('nav-name').innerText = userData.name;
                        } else {
                            // Flujo Alumno
                            document.getElementById('std-nav-name').innerText = userData.name;
                            document.getElementById('std-nav-id').innerText = `ID: ${userData.id}`;
                            switchView('student-panel');

                            // SI HAY CÓDIGO DIRECTO: REGISTRAR AUTOMÁTICAMENTE
                            if (directCode) {
                                document.getElementById('loading-text').innerText = "REGISTRANDO ASISTENCIA...";
                                await autoRegister(directCode);
                            }
                        }
                    }
                } else { 
                    // Si no hay sesión y hay código, guardar código para después de loguearse
                    if(directCode) localStorage.setItem('pending_code', directCode);
                    switchView('home'); 
                }
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('app-container').style.opacity = '1';
            });
        }

        async function autoRegister(code) {
            const codeSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public_codes', code));
            if(codeSnap.exists()) {
                const { teacherId, sessionId } = codeSnap.data();
                const sRef = doc(db, 'artifacts', APP_ID, 'users', teacherId, 'sessions', sessionId);
                const sSnap = await getDoc(sRef);
                
                if(sSnap.exists()) {
                    const data = sSnap.data();
                    const att = data.attendees || [];
                    if(!att.some(a => a.id === userData.id)) {
                        await updateDoc(sRef, { 
                            attendees: [...att, { name: userData.name, id: userData.id, time: new Date().toLocaleTimeString() }] 
                        });
                        
                        // Feedback visual exitoso
                        const card = document.getElementById('student-card');
                        card.classList.add('success-anim');
                        document.getElementById('status-area').innerHTML = `
                            <div class="text-[#22c55e] text-5xl mb-4">✓</div>
                            <h3 class="text-white font-black uppercase">¡ASISTENCIA REGISTRADA!</h3>
                            <p class="text-white/50 text-[10px] uppercase mt-2">${data.course}</p>
                            <button onclick="window.location.search=''" class="mt-6 text-white/30 text-[10px] uppercase">Aceptar</button>
                        `;
                    } else {
                        alert("YA ESTABAS REGISTRADO EN ESTA CLASE");
                    }
                }
            }
        }

        window.saveClass = async () => {
            const c = document.getElementById('sCourse').value.toUpperCase().trim();
            const g = document.getElementById('sGrade').value.toUpperCase().trim();
            const l = document.getElementById('sLevel').value;
            if(!c || !g) return;
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            const docRef = await addDoc(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'sessions'), { 
                level: l, course: c, grade: g, code, attendees: [], timestamp: Date.now() 
            });
            await setDoc(doc(db, 'artifacts', APP_ID, 'public_codes', code), { teacherId: currentUser.uid, sessionId: docRef.id });
            showQR(code, c);
        };

        window.showQR = (code, course) => { 
            document.getElementById('modal-code').innerText = code; 
            document.getElementById('modal-course-name').innerText = course;
            document.getElementById('qrcode-box').innerHTML = ""; 
            
            // EL QR CONTIENE LA URL CON EL PARÁMETRO DE CÓDIGO
            const directUrl = `${window.location.origin}${window.location.pathname}?c=${code}`;
            
            new QRCode(document.getElementById('qrcode-box'), { 
                text: directUrl, 
                width: 220, 
                height: 220,
                colorDark: "#0f172a",
                colorLight: "#ffffff"
            }); 
            document.getElementById('qr-modal').classList.remove('hidden'); 
        };

        // ... Resto de funciones (logout, handleAuth, etc) permanecen igual pero optimizadas ...
        window.logout = () => signOut(auth).then(() => window.location.href = window.location.origin + window.location.pathname);
        
        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
        };

        window.prepareAuth = (role) => { 
            window.userRole = role; 
            if(role === 'admin') { document.getElementById('authEmail').value = ADMIN_EMAIL; toggleAuthMode('login'); }
            switchView('auth'); 
        };

        window.toggleAuthMode = (mode) => { 
            window.authMode = mode; 
            document.getElementById('reg-fields').classList.toggle('hidden', mode !== 'register');
        };

        window.handleAuth = async () => {
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value;
            try {
                if (window.authMode === 'register') {
                    const name = document.getElementById('authName').value.toUpperCase().trim();
                    const id = document.getElementById('authId').value.toUpperCase().trim();
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, 'artifacts', APP_ID, 'users', res.user.uid, 'profile', 'info'), { name, email, id, role: window.userRole });
                } else { await signInWithEmailAndPassword(auth, email, pass); }
                
                // Si había un código pendiente, se procesará al recargar tras auth
                const pending = localStorage.getItem('pending_code');
                if(pending) {
                    window.location.search = `?c=${pending}`;
                    localStorage.removeItem('pending_code');
                }
            } catch (e) { alert("ERROR"); }
        };

        window.closeQR = () => document.getElementById('qr-modal').classList.add('hidden');

        // Monitoreos básicos
        function listenToTeacherSessions(uid) {
            onSnapshot(collection(db, 'artifacts', APP_ID, 'users', uid, 'sessions'), (snap) => {
                const list = document.getElementById('sessions-list');
                list.innerHTML = snap.docs.map(d => {
                    const s = d.data();
                    return `<div class="card-admin">
                        <div class="flex justify-between items-center mb-2"><span class="badge badge-teacher">${s.level}</span><p class="text-[9px] font-bold text-slate-300">ID: ${s.code}</p></div>
                        <h4 class="font-black text-[#1e40af] text-lg uppercase">${s.course}</h4>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">GRUPO ${s.grade} • ${s.attendees.length} Presentes</p>
                        <button onclick="showQR('${s.code}', '${s.course}')" class="mt-4 w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-black text-[10px] uppercase">Ver QR de Registro</button>
                    </div>`;
                }).join('');
            });
        }

        init();
    </script>
</body>
</html>
