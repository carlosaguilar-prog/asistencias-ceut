<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CEUT | CLOUD SEGURIDAD</title>
    
    <style>
        :root { 
            --bg-slate: #f8fafc;
            --ceut-blue: #1e40af; 
            --ceut-gold: #d4af37; 
            --ceut-dark: #0f172a;
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; 
            background-color: var(--bg-slate); 
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            color: #1e293b; width: 100%; height: 100%; 
        }

        #app-container { min-height: 100vh; width: 100%; opacity: 0; transition: opacity 0.4s ease; display: flex; flex-direction: column; }
        .view-section { display: none; width: 100%; min-height: 100vh; flex-direction: column; }
        .view-section.active { display: flex; }

        .input-ceut {
            width: 100%; padding: 1rem 1.2rem; background-color: white; border: 2px solid #e2e8f0;
            border-radius: 14px; font-size: 14px; font-weight: 700; color: var(--ceut-blue); outline: none; transition: all 0.2s;
        }
        .input-ceut:focus { border-color: var(--ceut-gold); }

        .btn-primary {
            background: var(--ceut-blue); color: white; padding: 1.1rem; border-radius: 16px; font-weight: 800;
            font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
            box-shadow: 0 10px 15px -3px rgba(30, 64, 175, 0.2); border: none; cursor: pointer; width: 100%;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-gold {
            background: var(--ceut-gold); color: var(--ceut-dark); padding: 1.1rem; border-radius: 16px; font-weight: 800;
            font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; border: none; cursor: pointer; width: 100%;
        }

        .qr-timer-bar { width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 15px; overflow: hidden; }
        #qr-progress { width: 100%; height: 100%; background: var(--ceut-gold); transition: width 1s linear; }
        
        .card-ceut { background: white; border-radius: 24px; padding: 1.2rem; border: 1px solid #e2e8f0; margin-bottom: 1rem; }
        
        #modal-qr { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); }
        .qr-container { background: white; padding: 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        .nav-tabs { display: flex; background: #e2e8f0; padding: 4px; border-radius: 16px; margin-bottom: 20px; }
        .nav-tab { flex: 1; text-align: center; padding: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; border-radius: 12px; cursor: pointer; color: #64748b; }
        .nav-tab.active { background: white; color: var(--ceut-blue); }

        #error-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #ef4444; color: white; padding: 12px 24px; border-radius: 12px;
            font-size: 10px; font-weight: 800; text-transform: uppercase; z-index: 10000;
            display: none; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
            text-align: center; width: 90%; max-width: 400px;
        }

        @media print {
            .no-print { display: none !important; }
            #modal-list { position: relative !important; display: block !important; }
        }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <div id="error-toast"></div>

    <!-- Pantalla de carga -->
    <div id="loading-overlay" class="fixed inset-0 bg-[#0f172a] z-[9999] flex flex-col items-center justify-center">
        <div class="relative w-20 h-20 mb-6">
            <div class="absolute inset-0 border-4 border-white/5 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-t-[#d4af37] rounded-full animate-spin"></div>
        </div>
        <p id="loading-text" class="text-[9px] font-black tracking-[0.4em] text-white/40 uppercase">Sincronizando Seguridad...</p>
    </div>

    <div id="app-container">
        <!-- VISTA HOME -->
        <main id="view-home" class="view-section active items-center justify-center p-8">
             <div class="max-w-xs w-full text-center">
                <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-24 mx-auto mb-8">
                <h1 class="text-4xl font-extrabold tracking-tighter mb-1 text-slate-900">CEUT <span class="text-[#d4af37]">CLOUD</span></h1>
                <p class="text-[9px] tracking-[0.4em] text-slate-400 font-bold uppercase mb-12">Portal de Asistencia Institucional</p>
                <div class="space-y-4">
                    <button onclick="window.setRole('admin')" class="w-full bg-slate-900 p-5 rounded-[2rem] shadow-xl flex items-center gap-4 border border-slate-700">
                        <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-xl">🔒</div>
                        <div class="text-left text-white"><p class="text-[10px] font-black uppercase">Administración</p><p class="text-[8px] opacity-40">ACCESO EXCLUSIVO</p></div>
                    </button>
                    <button onclick="window.setRole('teacher')" class="w-full bg-white p-5 rounded-[2rem] shadow-xl shadow-slate-200 flex items-center gap-4 border border-slate-100">
                        <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-xl">👨‍🏫</div>
                        <div class="text-left text-slate-800"><p class="text-[10px] font-black uppercase">Cuerpo Docente</p><p class="text-[8px] opacity-40">GESTIÓN DE CLASES</p></div>
                    </button>
                    <button onclick="window.setRole('student')" class="w-full bg-[#1e40af] p-5 rounded-[2rem] shadow-xl shadow-blue-200 flex items-center gap-4">
                        <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-xl">🎓</div>
                        <div class="text-left text-white"><p class="text-[10px] font-black uppercase">Comunidad Estudiantil</p><p class="text-[8px] opacity-40">ACCESO RÁPIDO</p></div>
                    </button>
                </div>
             </div>
        </main>

        <!-- VISTA AUTH -->
        <section id="view-auth" class="view-section p-8 bg-slate-50 items-center justify-center">
            <div class="w-full max-w-sm">
                <button onclick="window.switchView('home')" class="mb-8 text-[10px] font-black text-slate-400 uppercase">← Regresar</button>
                <h2 id="auth-title" class="text-3xl font-black text-slate-900 mb-8 uppercase tracking-tighter">Acceso</h2>
                <div id="auth-tabs-container" class="flex bg-slate-200 p-1 rounded-2xl mb-6">
                    <button id="auth-tab-login" class="flex-1 py-3 text-[10px] font-black uppercase rounded-xl bg-white text-blue-700">Entrar</button>
                    <button id="auth-tab-reg" class="flex-1 py-3 text-[10px] font-black uppercase rounded-xl text-slate-500">Crear Cuenta</button>
                </div>
                <div class="space-y-3">
                    <div id="reg-inputs" class="hidden space-y-3">
                        <input type="text" id="authName" placeholder="Nombre Completo" class="input-ceut uppercase">
                        <input type="text" id="authId" placeholder="Matrícula / ID" class="input-ceut uppercase">
                    </div>
                    <input type="email" id="authEmail" placeholder="Correo Institucional" class="input-ceut">
                    <input type="password" id="authPass" placeholder="Contraseña" class="input-ceut">
                    <button id="btn-auth-submit" class="btn-primary mt-4">Continuar</button>
                </div>
            </div>
        </section>

        <!-- PANEL ADMINISTRADOR -->
        <section id="view-admin-panel" class="view-section bg-[#0f172a]">
            <nav class="p-6 flex justify-between items-center border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="text-white text-[10px] font-black uppercase tracking-widest">Supervisión Central</span>
                </div>
                <button onclick="window.logout()" class="text-white/40 text-[9px] font-bold">CERRAR SESIÓN</button>
            </nav>
            <div class="p-6 overflow-y-auto">
                <h3 class="text-white font-black text-2xl uppercase mb-6">Control <span class="text-[#d4af37]">Global</span></h3>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-white/40 text-[8px] font-black uppercase">Clases en Nube</p>
                        <p id="stat-classes" class="text-white text-2xl font-black">0</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-white/40 text-[8px] font-black uppercase">Total Asistencias</p>
                        <p id="stat-students" class="text-white text-2xl font-black">0</p>
                    </div>
                </div>

                <div id="admin-global-list" class="space-y-4 pb-20"></div>
            </div>
        </section>

        <!-- PANEL DOCENTE -->
        <section id="view-teacher-panel" class="view-section bg-[#f1f5f9]">
            <nav class="bg-[#1e40af] p-6 text-white flex justify-between items-center">
                <span id="doc-name" class="text-sm font-black uppercase">Docente</span>
                <button onclick="window.logout()" class="text-[9px] font-black bg-white/10 px-3 py-2 rounded-lg tracking-widest">SALIR</button>
            </nav>
            <div class="p-6 max-w-2xl mx-auto w-full">
                <div class="nav-tabs">
                    <div id="tab-register" class="nav-tab active">Nueva Clase</div>
                    <div id="tab-history" class="nav-tab">Mis Clases</div>
                </div>
                <div id="module-register" class="space-y-6">
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
                        <input type="text" id="sCourse" placeholder="MATERIA (EJ. PSICOLOGÍA)" class="input-ceut uppercase mb-4">
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <input type="text" id="sGrade" placeholder="GRUPO (EJ. 502)" class="input-ceut uppercase">
                            <input type="text" id="sClassId" class="input-ceut bg-slate-50 font-mono" readonly>
                        </div>
                        <button id="btn-create-session" class="btn-primary">Iniciar Clase QR</button>
                    </div>
                </div>
                <div id="module-history" class="hidden"><div id="teacher-sessions-list"></div></div>
            </div>
        </section>

        <!-- PANEL ALUMNO -->
        <section id="view-student-panel" class="view-section items-center justify-center p-8 bg-[#1e40af]">
            <div class="w-full max-w-sm bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-[3rem] text-center">
                <h2 id="std-name" class="text-2xl font-black text-white uppercase mb-1">Alumno</h2>
                <p id="std-id" class="text-[#d4af37] text-[10px] font-black uppercase mb-8">ID: ---</p>
                <div id="attendance-status">
                    <div id="status-waiting" class="animate-pulse">
                        <p class="text-white/40 text-[9px] font-bold uppercase tracking-[0.3em]">Esperando escaneo QR...</p>
                    </div>
                    <div id="status-confirm" class="hidden">
                        <div class="bg-white rounded-3xl p-6 text-left mb-6">
                            <h3 id="confirm-course" class="text-[#1e40af] font-black text-xl uppercase">---</h3>
                        </div>
                        <button id="btn-confirm-attendance" class="btn-gold">Confirmar Mi Asistencia</button>
                    </div>
                    <div id="status-success" class="hidden text-emerald-400 font-black uppercase">¡Asistencia Registrada!</div>
                </div>
                <button onclick="window.logout()" class="mt-12 text-white/20 text-[9px] font-black uppercase">Cerrar Sesión</button>
            </div>
        </section>
    </div>

    <!-- MODAL LISTA -->
    <div id="modal-list" class="fixed inset-0 bg-white z-[1000] hidden flex flex-col">
        <div class="bg-[#1e40af] p-8 text-white flex justify-between items-end no-print">
            <div><h3 id="list-course" class="text-xl font-black uppercase">Materia</h3></div>
            <button onclick="document.getElementById('modal-list').classList.add('hidden')" class="bg-white/10 w-12 h-12 rounded-2xl flex items-center justify-center">✕</button>
        </div>
        <div id="list-body" class="flex-1 p-6 overflow-y-auto space-y-3 bg-slate-50"></div>
        <div class="p-6 border-t grid grid-cols-2 gap-3 no-print">
            <button id="btn-print" class="bg-slate-800 text-white py-4 rounded-xl font-black uppercase text-[9px]">Imprimir</button>
            <button id="btn-pdf" class="bg-red-600 text-white py-4 rounded-xl font-black uppercase text-[9px]">PDF</button>
            <button id="btn-edit-session" class="bg-slate-200 text-slate-800 py-4 rounded-xl font-black uppercase text-[9px]">Editar</button>
            <button id="btn-delete-session" class="bg-rose-100 text-rose-600 py-4 rounded-xl font-black uppercase text-[9px]">Borrar Todo</button>
        </div>
    </div>

    <!-- MODAL QR -->
    <div id="modal-qr" class="fixed inset-0 z-[1000] hidden flex flex-col items-center justify-center p-8 no-print">
        <div class="qr-container mb-8">
            <div id="qrcode"></div>
            <div class="qr-timer-bar"><div id="qr-progress"></div></div>
        </div>
        <button onclick="clearInterval(qrInterval); document.getElementById('modal-qr').classList.add('hidden');" class="btn-primary max-w-xs bg-white text-blue-950">Finalizar Pase</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, setDoc, deleteDoc, getDoc, query, where, getDocs, collectionGroup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyCefP6qEqaCMpo8ZpUiLpN4e_-E4ZNTp94","authDomain":"asistencias-ceut.firebaseapp.com","projectId":"asistencias-ceut","appId":"1:130615246146:web:6ae2c17c828fb28a809cdb"}');
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'ceut_cloud_v14';
        
        // ADMINISTRADOR ÚNICO - HARDCODED
        const ADMIN_EMAIL = "carlos.aguilar@ceut.edu.mx";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user, profile, qrInterval, currentSessionRef, currentSessionData, currentRole = 'student', currentAuthMode = 'login';

        const showToast = (msg) => {
            const t = document.getElementById('error-toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 5000);
        };

        const switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            const target = document.getElementById('view-' + id);
            if(target) target.classList.add('active');
        };

        window.switchView = switchView;
        window.setRole = (role) => {
            currentRole = role;
            const tabs = document.getElementById('auth-tabs-container');
            const authTitle = document.getElementById('auth-title');
            
            if(role === 'admin') {
                tabs.style.display = 'none';
                currentAuthMode = 'login';
                document.getElementById('reg-inputs').classList.add('hidden');
                authTitle.innerText = "Acceso Admin Central";
                document.getElementById('authEmail').value = ADMIN_EMAIL;
            } else {
                tabs.style.display = 'flex';
                authTitle.innerText = role === 'teacher' ? "Panel Docente" : "Panel Alumnos";
                document.getElementById('authEmail').value = "";
            }
            switchView('auth');
        };

        const init = () => {
            onAuthStateChanged(auth, async (u) => {
                if (u) {
                    user = u;
                    const emailNorm = u.email.toLowerCase();
                    
                    // Lógica de Identificación
                    if (emailNorm === ADMIN_EMAIL.toLowerCase()) {
                        profile = { name: "Ing. Carlos Aguilar", role: "admin", email: emailNorm };
                        loadPanel();
                    } else {
                        try {
                            const profileSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'users', u.uid, 'profile', 'info'));
                            if (profileSnap.exists()) {
                                profile = profileSnap.data();
                                loadPanel();
                            } else {
                                // Usuario autenticado pero sin perfil en Firestore
                                showToast("Perfil no encontrado. Contacte a soporte.");
                                await signOut(auth);
                                switchView('home');
                            }
                        } catch(e) {
                            showToast("Error de sincronización con la base de datos.");
                            await signOut(auth);
                        }
                    }
                } else {
                    switchView('home');
                }
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('app-container').style.opacity = '1';
            });
        };

        const loadPanel = () => {
            if (!profile) return;
            if (profile.role === 'admin') {
                switchView('admin-panel');
                loadAdminData();
            } else if (profile.role === 'teacher') {
                switchView('teacher-panel');
                document.getElementById('doc-name').innerText = profile.name;
                document.getElementById('sClassId').value = "CL-" + Math.random().toString(36).substr(2, 5).toUpperCase();
                loadTeacherData();
            } else {
                switchView('student-panel');
                document.getElementById('std-name').innerText = profile.name;
                document.getElementById('std-id').innerText = `ID: ${profile.id}`;
                checkQR();
            }
        };

        const loadAdminData = () => {
            const list = document.getElementById('admin-global-list');
            onSnapshot(collectionGroup(db, 'sessions'), (snap) => {
                const sessions = snap.docs.map(d => ({...d.data(), fullPath: d.ref.path, id: d.id}));
                document.getElementById('stat-classes').innerText = sessions.length;
                document.getElementById('stat-students').innerText = sessions.reduce((acc, s) => acc + (s.attendees?.length || 0), 0);
                
                list.innerHTML = sessions.sort((a,b) => b.timestamp - a.timestamp).map(s => `
                    <div class="bg-white/5 p-5 rounded-2xl border border-white/5 flex justify-between items-center">
                        <div>
                            <p class="text-[#d4af37] text-[10px] font-black uppercase">${s.course || 'Sin Materia'}</p>
                            <p class="text-white/40 text-[8px] uppercase">GRUPO: ${s.grade || 'S/G'} | ${s.attendees?.length || 0} REGISTROS</p>
                        </div>
                        <button onclick="window.openDetails('${encodeURIComponent(JSON.stringify(s))}')" class="bg-[#d4af37] px-4 py-2 rounded-lg text-slate-950 text-[9px] font-bold">VER</button>
                    </div>
                `).join('') || '<p class="text-white/20 text-center py-10 uppercase text-[9px]">No hay actividad hoy</p>';
            }, (err) => showToast("Error en Monitor Global. Reintente."));
        };

        const loadTeacherData = () => {
            const sessionsCol = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'sessions');
            onSnapshot(sessionsCol, (snap) => {
                const list = document.getElementById('teacher-sessions-list');
                list.innerHTML = snap.docs.sort((a,b) => b.data().timestamp - a.data().timestamp).map(d => {
                    const s = d.data();
                    const sJson = encodeURIComponent(JSON.stringify({...s, fullPath: d.ref.path, id: d.id}));
                    return `
                        <div class="card-ceut">
                            <h4 class="font-black uppercase text-slate-800 text-sm">${s.course}</h4>
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-4">GRUPO ${s.grade}</p>
                            <div class="flex gap-2">
                                <button onclick="window.showQR('${s.classId}')" class="bg-slate-100 p-3 rounded-xl text-[9px] font-black uppercase">QR</button>
                                <button onclick="window.openDetails('${sJson}')" class="bg-blue-600 p-3 flex-1 rounded-xl text-white text-[9px] font-black uppercase">LISTA (${s.attendees.length})</button>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        };

        window.openDetails = (encoded) => {
            const s = JSON.parse(decodeURIComponent(encoded));
            currentSessionData = s;
            currentSessionRef = doc(db, s.fullPath);
            
            document.getElementById('list-course').innerText = s.course;
            const body = document.getElementById('list-body');
            body.innerHTML = s.attendees.map((a, i) => `
                <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div>
                        <p class="text-[10px] font-black uppercase">${a.name}</p>
                        <p class="text-[8px] text-slate-400 font-bold">${a.id} • ${a.time}</p>
                    </div>
                    <button onclick="window.removeStudent(${i})" class="text-rose-500 font-bold px-2 no-print">✕</button>
                </div>
            `).join('') || '<p class="text-center text-slate-300 py-10 uppercase text-[10px] font-bold">Sin registros aún</p>';
            
            document.getElementById('modal-list').classList.remove('hidden');
        };

        window.removeStudent = async (index) => {
            const updated = [...currentSessionData.attendees];
            updated.splice(index, 1);
            await updateDoc(currentSessionRef, { attendees: updated });
            currentSessionData.attendees = updated;
            window.openDetails(encodeURIComponent(JSON.stringify(currentSessionData)));
        };

        window.showQR = (cid) => {
            const qrBox = document.getElementById('qrcode');
            qrBox.innerHTML = "";
            document.getElementById('modal-qr').classList.remove('hidden');
            const update = () => {
                qrBox.innerHTML = "";
                const tk = Math.floor(Date.now() / 10000);
                const url = `${window.location.origin}${window.location.pathname}?cid=${cid}&tk=${tk}`;
                new QRCode(qrBox, { text: url, width: 220, height: 220 });
            };
            update();
            if(qrInterval) clearInterval(qrInterval);
            qrInterval = setInterval(update, 10000);
        };

        const checkQR = async () => {
            const params = new URLSearchParams(window.location.search);
            const cid = params.get('cid'), tk = params.get('tk');
            if(!cid || !tk) return;
            
            if(Math.abs(Math.floor(Date.now() / 10000) - parseInt(tk)) > 3) {
                showToast("QR Expirado. Escanee uno nuevo."); return;
            }

            const q = query(collectionGroup(db, 'sessions'), where("classId", "==", cid));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const sRef = snap.docs[0].ref;
                const sData = snap.docs[0].data();
                document.getElementById('confirm-course').innerText = sData.course;
                document.getElementById('status-waiting').classList.add('hidden');
                document.getElementById('status-confirm').classList.remove('hidden');
                
                document.getElementById('btn-confirm-attendance').onclick = async () => {
                    if(sData.attendees.some(a => a.id === profile.id)) {
                        showToast("Ya has sido registrado en esta clase.");
                    } else {
                        const updated = [...sData.attendees, { name: profile.name, id: profile.id, time: new Date().toLocaleTimeString() }];
                        await updateDoc(sRef, { attendees: updated });
                        document.getElementById('status-confirm').classList.add('hidden');
                        document.getElementById('status-success').classList.remove('hidden');
                    }
                };
            }
        };

        document.getElementById('btn-auth-submit').onclick = async () => {
            const btn = document.getElementById('btn-auth-submit');
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value;
            
            if(!email || !pass) return showToast("Faltan datos de acceso");
            btn.disabled = true;

            try {
                if(currentAuthMode === 'register') {
                    const name = document.getElementById('authName').value.toUpperCase();
                    const id = document.getElementById('authId').value.toUpperCase();
                    if(!name || !id) throw new Error("Faltan datos de registro");

                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, 'artifacts', APP_ID, 'users', res.user.uid, 'profile', 'info'), {
                        name, id, email, role: currentRole, createdAt: Date.now()
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch(e) { 
                let errorMsg = "Credenciales incorrectas.";
                if(e.code === 'auth/email-already-in-use') errorMsg = "El correo ya está registrado.";
                if(e.code === 'auth/weak-password') errorMsg = "La contraseña es muy débil.";
                if(e.code === 'auth/user-not-found') errorMsg = "Usuario no registrado.";
                showToast(errorMsg); 
                btn.disabled = false;
            }
        };

        document.getElementById('btn-create-session').onclick = async () => {
            const course = document.getElementById('sCourse').value.toUpperCase();
            const grade = document.getElementById('sGrade').value.toUpperCase();
            const cid = document.getElementById('sClassId').value;
            if(!course || !grade) return showToast("Indique materia y grupo.");
            
            await addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'sessions'), {
                course, grade, classId: cid, timestamp: Date.now(), attendees: []
            });
            window.showQR(cid);
        };

        document.getElementById('btn-pdf').onclick = () => {
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF();
            docPdf.text(`CEUT | LISTA DE ASISTENCIA: ${currentSessionData.course}`, 14, 20);
            docPdf.setFontSize(10);
            docPdf.text(`Grupo: ${currentSessionData.grade} | Fecha: ${new Date(currentSessionData.timestamp).toLocaleDateString()}`, 14, 30);
            docPdf.autoTable({
                startY: 40,
                head: [['Nombre', 'ID / Matrícula', 'Hora de Registro']],
                body: currentSessionData.attendees.map(a => [a.name, a.id, a.time])
            });
            docPdf.save(`Asistencia_${currentSessionData.course}_${currentSessionData.grade}.pdf`);
        };

        document.getElementById('btn-print').onclick = () => window.print();

        window.logout = () => signOut(auth);

        document.getElementById('auth-tab-login').onclick = () => {
            currentAuthMode = 'login';
            document.getElementById('reg-inputs').classList.add('hidden');
            document.getElementById('auth-tab-login').classList.add('bg-white', 'text-blue-700');
            document.getElementById('auth-tab-reg').classList.remove('bg-white', 'text-blue-700');
        };

        document.getElementById('auth-tab-reg').onclick = () => {
            currentAuthMode = 'register';
            document.getElementById('reg-inputs').classList.remove('hidden');
            document.getElementById('auth-tab-reg').classList.add('bg-white', 'text-blue-700');
            document.getElementById('auth-tab-login').classList.remove('bg-white', 'text-blue-700');
        };

        init();
    </script>
</body>
</html>
