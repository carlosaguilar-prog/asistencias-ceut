<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CEUT | PANEL DE CONTROL TOTAL</title>
    
    <style>
        :root { 
            --bg-deep: #0f172a; 
            --accent-gold: #d4af37; 
            --ceutBlue: #1e40af;
            --ceutBlueLight: #dbeafe;
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; 
            background-color: var(--bg-deep); 
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            color: white; width: 100%; height: 100%; overflow: hidden;
        }

        #app-container { height: 100%; width: 100%; overflow-y: auto; opacity: 0; transition: opacity 0.5s ease; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .view-section { display: none; width: 100%; min-height: 100%; flex-direction: column; }
        .view-section.active { display: flex; }

        .input-ceut {
            width: 100%;
            padding: 1.1rem;
            background-color: white !important;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 800;
            color: #1e40af !important;
            text-transform: uppercase;
            outline: none;
        }

        #master-access-trigger {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            width: 45px; height: 45px; background: #1e293b; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--accent-gold); cursor: pointer;
        }

        .action-btn { transition: all 0.1s; cursor: pointer; }
        .action-btn:active { transform: scale(0.95); }
        
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: #1e40af; color: white; }
        .tab-btn:not(.active) { color: #64748b; background: transparent; }

        .attendee-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: white; border-radius: 12px; margin-top: 6px;
            color: #1e293b;
        }

        .role-badge {
            padding: 2px 8px; border-radius: 4px; font-size: 8px; font-weight: 900; text-transform: uppercase;
        }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <!-- Acceso Admin Oculto -->
    <div id="master-access-trigger" onclick="prepareAuth('admin')" class="no-print">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>

    <!-- Pantalla de Carga -->
    <div id="loading-overlay" class="fixed inset-0 bg-[#0f172a] z-[9999] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-white/10 border-t-[#d4af37] rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-bold tracking-[0.3em] opacity-40 uppercase">CEUT Cloud Sync</p>
    </div>

    <div id="app-container">
        <!-- HOME (Siempre es la vista inicial) -->
        <main id="view-home" class="view-section active items-center justify-center p-6 text-center">
            <div class="max-w-md w-full">
                <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-24 mx-auto mb-6">
                <h1 class="text-4xl font-extrabold tracking-tighter mb-2 text-white">CEUT <span class="text-[#d4af37]">CLOUD</span></h1>
                <p class="text-[10px] tracking-[0.4em] text-white/40 font-bold uppercase mb-10">CONTROL TOTAL ADMINISTRATIVO</p>
                <div class="space-y-4">
                    <button onclick="handleProtectedAccess('teacher')" class="w-full glass p-5 rounded-3xl flex items-center gap-5 action-btn border border-white/10">
                        <div class="w-12 h-12 bg-[#d4af37] rounded-2xl flex items-center justify-center text-2xl">👨‍🏫</div>
                        <div class="text-left"><p class="text-[13px] font-black uppercase text-white">Docentes</p><p class="text-[9px] text-white/50">Gestión de mis grupos</p></div>
                    </button>
                    <button onclick="handleProtectedAccess('student')" class="w-full bg-white p-5 rounded-3xl flex items-center gap-5 action-btn shadow-xl">
                        <div class="w-12 h-12 bg-[#1e40af] rounded-2xl flex items-center justify-center text-2xl text-white">🎓</div>
                        <div class="text-left"><p class="text-[13px] font-black text-[#1e40af] uppercase">Alumnos</p><p class="text-[9px] text-slate-400">Registrar mi entrada</p></div>
                    </button>
                </div>
            </div>
        </main>

        <!-- LOGIN / REGISTRO -->
        <section id="view-auth" class="view-section p-6 bg-slate-50 items-center justify-center">
            <div class="w-full max-w-sm">
                <button onclick="switchView('home')" class="mb-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">← Inicio</button>
                <h2 id="auth-title" class="text-2xl font-black text-[#1e40af] mb-6 uppercase tracking-tighter">Acceso al Sistema</h2>
                <div id="auth-mode-selector" class="flex bg-slate-200/50 p-1 rounded-2xl mb-6">
                    <button onclick="toggleAuthMode('login')" id="btn-mode-login" class="flex-1 py-3 rounded-xl font-bold text-[10px] uppercase bg-white shadow-sm text-[#1e40af]">Login</button>
                    <button onclick="toggleAuthMode('register')" id="btn-mode-register" class="flex-1 py-3 rounded-xl font-bold text-[10px] uppercase text-slate-400">Registro</button>
                </div>
                <div class="space-y-4">
                    <div id="reg-fields" class="hidden space-y-4">
                        <input type="text" id="authName" placeholder="NOMBRE COMPLETO" class="input-ceut">
                        <input type="text" id="authId" placeholder="MATRÍCULA / ID" class="input-ceut">
                    </div>
                    <input type="email" id="authEmail" placeholder="CORREO" class="input-ceut" style="text-transform: none;">
                    <input type="password" id="authPass" placeholder="CONTRASEÑA" class="input-ceut" style="text-transform: none;">
                    <button onclick="handleAuth()" class="w-full bg-[#1e40af] text-white p-5 rounded-2xl font-black mt-2 uppercase text-[11px] tracking-widest shadow-xl action-btn">CONTINUAR</button>
                </div>
            </div>
        </section>

        <!-- PANEL CENTRALIZADO (DOCENTE/ADMIN) -->
        <section id="view-unified-panel" class="view-section bg-slate-100">
            <nav class="bg-[#1e40af] p-5 flex justify-between items-center text-white sticky top-0 z-50">
                <div class="flex flex-col">
                    <span id="display-user-name" class="text-[12px] font-black uppercase tracking-tight">Cargando...</span>
                    <span id="display-user-role" class="text-[8px] font-bold opacity-60 uppercase">Rol</span>
                </div>
                <button onclick="logout()" class="text-[9px] font-black bg-white/10 px-4 py-2 rounded-xl">SALIR</button>
            </nav>

            <div id="admin-controls" class="hidden bg-[#0f172a] p-2 m-4 rounded-2xl flex gap-2">
                <button id="admin-btn-doc" onclick="setAdminMode('teacher')" class="flex-1 py-3 bg-[#d4af37] text-white text-[9px] font-black rounded-xl uppercase">Modo Docente</button>
                <button id="admin-btn-adm" onclick="setAdminMode('admin')" class="flex-1 py-3 text-slate-400 text-[9px] font-black rounded-xl uppercase">Modo Admin</button>
            </div>

            <div id="panel-body" class="p-4 pb-32">
                <!-- VISTA DOCENTE -->
                <div id="panel-teacher" class="space-y-6">
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center">Abrir Pase de Lista</p>
                        <input type="text" id="sCourse" placeholder="Materia" class="input-ceut mb-3">
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <input type="text" id="sGrade" placeholder="Grupo" class="input-ceut">
                            <select id="sLevel" class="input-ceut text-[11px] font-black">
                                <option value="LICENCIATURA">LIC</option>
                                <option value="BACHILLERATO">BACH</option>
                            </select>
                        </div>
                        <button onclick="createNewSession()" class="w-full bg-[#d4af37] text-[#1e40af] py-5 rounded-2xl font-black text-[11px] uppercase shadow-md action-btn">Generar QR</button>
                    </div>
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest px-2">Mis Sesiones del Día</h3>
                    <div id="my-sessions" class="space-y-3"></div>
                </div>

                <!-- VISTA ADMINISTRADOR -->
                <div id="panel-admin" class="hidden space-y-6">
                    <div class="flex bg-slate-200 p-1 rounded-xl">
                        <button id="tab-btn-global" onclick="switchAdminTab('global')" class="tab-btn active">Clases Globales</button>
                        <button id="tab-btn-users" onclick="switchAdminTab('users')" class="tab-btn">Usuarios</button>
                    </div>
                    <div id="admin-view-global" class="space-y-3">
                        <div id="all-sessions-list" class="space-y-3"></div>
                    </div>
                    <div id="admin-view-users" class="hidden space-y-2">
                        <div id="all-users-list" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- PANEL ALUMNO -->
        <section id="view-student-panel" class="view-section bg-[#1e40af] p-6 items-center justify-center">
            <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border border-white/10">
                <div class="w-16 h-16 bg-white/10 rounded-3xl mx-auto mb-4 flex items-center justify-center text-3xl">🎓</div>
                <h2 id="std-name" class="text-xl font-black text-white uppercase mb-1">Cargando...</h2>
                <p id="std-id" class="text-[#d4af37] text-[9px] font-black uppercase tracking-widest mb-10">---</p>
                <div id="student-status" class="space-y-4">
                    <div class="w-10 h-10 border-2 border-white/20 border-t-white rounded-full animate-spin mx-auto"></div>
                    <p class="text-white/40 text-[9px] font-bold uppercase">Escanea el QR de tu clase</p>
                </div>
                <button onclick="logout()" class="mt-12 text-white/30 text-[9px] font-black uppercase underline">Cerrar Sesión</button>
            </div>
        </section>
    </div>

    <!-- MODAL QR -->
    <div id="modal-qr" class="fixed inset-0 bg-[#0f172a]/98 backdrop-blur-2xl z-[1000] hidden flex flex-col items-center justify-center p-6">
        <div id="qrcode" class="p-6 bg-white rounded-[2rem] mb-6 border-4 border-[#d4af37]"></div>
        <h4 id="qr-code-text" class="text-4xl font-black text-white mb-2">000000</h4>
        <p id="qr-course-text" class="text-[#d4af37] font-black uppercase text-[12px] mb-8">MATERIA</p>
        <button onclick="closeModal('modal-qr')" class="w-full max-w-xs py-5 bg-white text-[#1e40af] rounded-2xl font-black uppercase text-[12px]">Cerrar</button>
    </div>

    <!-- MODAL LISTADO -->
    <div id="modal-attendees" class="fixed inset-0 bg-slate-100 z-[1000] hidden flex flex-col">
        <div class="bg-[#1e40af] p-6 flex justify-between items-center text-white">
            <h3 class="font-black text-sm uppercase">Lista de Asistencia</h3>
            <button onclick="closeModal('modal-attendees')" class="text-[10px] font-bold">CERRAR</button>
        </div>
        <div id="attendees-body" class="p-4 overflow-y-auto flex-1"></div>
        <div class="p-4 bg-white border-t border-slate-200">
            <button id="btn-download-pdf" class="w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase text-[11px]">Descargar Reporte PDF</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, setDoc, deleteDoc, getDoc, collectionGroup, query, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCefP6qEqaCMpo8ZpUiLpN4e_-E4ZNTp94",
            authDomain: "asistencias-ceut.firebaseapp.com",
            projectId: "asistencias-ceut",
            appId: "1:130615246146:web:6ae2c17c828fb28a809cdb"
        };

        const APP_ID = "ceut-v12-final";
        const ADMIN_MAIL = "carlos.aguilar@ceut.edu.mx";
        let db, auth, currentUser, userProfile;

        async function start() {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            onAuthStateChanged(auth, async (user) => {
                if(user) {
                    currentUser = user;
                    if(user.email === ADMIN_MAIL) {
                        userProfile = { name: "CARLOS AGUILAR", role: "admin", id: "ADMIN-CEUT" };
                        setupAdmin();
                    } else {
                        const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'info'));
                        if(snap.exists()) {
                            userProfile = snap.data();
                            // El sistema ahora espera a que el usuario haga clic en una categoría en el Home
                            // o lo deja en el Home si acaba de abrir la página.
                        }
                    }
                }
                
                // Si hay un código en la URL, forzamos la vista de alumno si está logueado
                const code = new URLSearchParams(window.location.search).get('c');
                if(code && currentUser && userProfile) {
                    setupInterface();
                }

                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('app-container').style.opacity = '1';
            });
        }

        // Navegación inteligente
        window.handleProtectedAccess = (role) => {
            window.userRole = role;
            if(currentUser && userProfile) {
                // Si ya está logueado, verificamos que el rol coincida o sea admin
                if(userProfile.role === role || userProfile.role === 'admin') {
                    setupInterface();
                } else {
                    alert("Tu cuenta no tiene permisos para este perfil.");
                }
            } else {
                switchView('auth');
            }
        };

        function setupInterface() {
            if(userProfile.role === 'teacher' || (userProfile.role === 'admin' && window.userRole === 'teacher')) {
                switchView('unified-panel');
                document.getElementById('display-user-name').innerText = userProfile.name;
                document.getElementById('display-user-role').innerText = userProfile.role === 'admin' ? "MODO DOCENTE" : "DOCENTE";
                listenSessions();
            } else if(userProfile.role === 'student' || window.userRole === 'student') {
                switchView('student-panel');
                document.getElementById('std-name').innerText = userProfile.name;
                document.getElementById('std-id').innerText = `ID: ${userProfile.id}`;
                checkAutoRegister();
            } else if(userProfile.role === 'admin') {
                setupAdmin();
            }
        }

        function setupAdmin() {
            switchView('unified-panel');
            document.getElementById('display-user-name').innerText = userProfile.name;
            document.getElementById('display-user-role').innerText = "ADMINISTRADOR GENERAL";
            document.getElementById('admin-controls').classList.remove('hidden');
            listenSessions();
            listenGlobalSessions();
            listenGlobalUsers();
        }

        window.setAdminMode = (mode) => {
            const isAdm = mode === 'admin';
            document.getElementById('panel-teacher').classList.toggle('hidden', isAdm);
            document.getElementById('panel-admin').classList.toggle('hidden', !isAdm);
            document.getElementById('admin-btn-doc').className = isAdm ? "flex-1 py-3 text-slate-400 text-[9px] font-black rounded-xl uppercase" : "flex-1 py-3 bg-[#d4af37] text-white text-[9px] font-black rounded-xl uppercase";
            document.getElementById('admin-btn-adm').className = isAdm ? "flex-1 py-3 bg-[#1e40af] text-white text-[9px] font-black rounded-xl uppercase" : "flex-1 py-3 text-slate-400 text-[9px] font-black rounded-xl uppercase";
        };

        window.switchAdminTab = (tab) => {
            const isGlob = tab === 'global';
            document.getElementById('admin-view-global').classList.toggle('hidden', !isGlob);
            document.getElementById('admin-view-users').classList.toggle('hidden', isGlob);
            document.getElementById('tab-btn-global').classList.toggle('active', isGlob);
            document.getElementById('tab-btn-users').classList.toggle('active', !isGlob);
        };

        function listenGlobalSessions() {
            onSnapshot(collectionGroup(db, 'sessions'), (snap) => {
                const list = document.getElementById('all-sessions-list');
                const sorted = snap.docs.sort((a,b) => b.data().timestamp - a.data().timestamp);
                list.innerHTML = sorted.map(d => renderSessionCard(d, true)).join('');
            });
        }

        function listenGlobalUsers() {
            onSnapshot(collectionGroup(db, 'profile'), (snap) => {
                const list = document.getElementById('all-users-list');
                list.innerHTML = snap.docs.map(d => {
                    const u = d.data();
                    return `
                        <div class="bg-white p-4 rounded-xl flex justify-between items-center border border-slate-200">
                            <div><p class="text-[11px] font-black text-slate-900 uppercase">${u.name}</p><p class="text-[8px] font-bold text-slate-400">${u.email}</p></div>
                            <div class="text-right">
                                <span class="role-badge ${u.role === 'teacher' ? 'bg-amber-100 text-amber-600' : 'bg-blue-100 text-blue-600'}">${u.role}</span>
                                <p class="text-[8px] font-black text-slate-400 mt-1">${u.id}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        function listenSessions() {
            onSnapshot(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'sessions'), (snap) => {
                const list = document.getElementById('my-sessions');
                const sorted = snap.docs.sort((a,b) => b.data().timestamp - a.data().timestamp);
                list.innerHTML = sorted.map(d => renderSessionCard(d, false)).join('');
            });
        }

        function renderSessionCard(d, isAdmin) {
            const s = d.data();
            const attendeesCount = s.attendees?.length || 0;
            const path = d.ref.path;
            return `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between mb-2">
                        <span class="text-[8px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-md uppercase">${s.level} | ${s.grade}</span>
                        <span class="text-[9px] font-black text-slate-400">PIN: ${s.code}</span>
                    </div>
                    <h4 class="text-[14px] font-black text-slate-900 uppercase">${s.course}</h4>
                    ${isAdmin ? `<p class="text-[8px] font-bold text-amber-600 uppercase mb-3">Prof: ${s.teacherName}</p>` : ''}
                    <div class="grid grid-cols-3 gap-2 mt-4">
                        <button onclick="showQR('${s.code}', '${s.course}')" class="bg-slate-100 py-3 rounded-xl text-[9px] font-black uppercase text-slate-600">QR</button>
                        <button onclick="openAttendees('${encodeURIComponent(JSON.stringify({...s, path}))}')" class="bg-blue-600 py-3 rounded-xl text-[9px] font-black uppercase text-white">Alumnos (${attendeesCount})</button>
                        <button onclick="deleteSession('${path}')" class="bg-red-50 py-3 rounded-xl text-[9px] font-black uppercase text-red-400">Borrar</button>
                    </div>
                </div>
            `;
        }

        window.createNewSession = async () => {
            const course = document.getElementById('sCourse').value.toUpperCase().trim();
            const grade = document.getElementById('sGrade').value.toUpperCase().trim();
            const level = document.getElementById('sLevel').value;
            if(!course || !grade) return;
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            await addDoc(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'sessions'), {
                course, grade, level, code, teacherName: userProfile.name, timestamp: Date.now(), attendees: []
            });
            document.getElementById('sCourse').value = ""; document.getElementById('sGrade').value = "";
        };

        window.openAttendees = (encodedData) => {
            const s = JSON.parse(decodeURIComponent(encodedData));
            const list = document.getElementById('attendees-body');
            document.getElementById('modal-attendees').classList.remove('hidden');
            list.innerHTML = (s.attendees?.length > 0) ? s.attendees.map(a => `
                <div class="attendee-row shadow-sm border border-slate-100">
                    <div><p class="text-[11px] font-black uppercase">${a.name}</p><p class="text-[8px] font-bold text-slate-400">${a.id}</p></div>
                    <span class="text-[9px] font-black text-blue-600">${a.time}</span>
                </div>
            `).join('') : `<div class="text-center py-20 text-slate-300 font-black uppercase text-[10px]">Sin alumnos registrados</div>`;
            document.getElementById('btn-download-pdf').onclick = () => exportPDF(s);
        };

        window.exportPDF = (s) => {
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF();
            docPdf.setFont("helvetica", "bold");
            docPdf.setFillColor(30, 64, 175); docPdf.rect(0, 0, 210, 40, 'F');
            docPdf.setTextColor(255, 255, 255); docPdf.text("CEUT | REPORTE DE ASISTENCIA", 15, 25);
            docPdf.setTextColor(0); docPdf.setFontSize(10);
            docPdf.text(`MATERIA: ${s.course}`, 15, 50); docPdf.text(`DOCENTE: ${s.teacherName}`, 15, 57);
            docPdf.text(`GRUPO: ${s.grade}`, 15, 64); docPdf.text(`FECHA: ${new Date(s.timestamp).toLocaleDateString()}`, 15, 71);
            docPdf.autoTable({ startY: 80, head: [['NOMBRE', 'MATRÍCULA', 'HORA']], body: (s.attendees || []).map(a => [a.name, a.id, a.time]), headStyles: { fillColor: [30, 64, 175] } });
            docPdf.save(`REPORTE_${s.course}.pdf`);
        };

        window.deleteSession = async (path) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, path)); };

        async function checkAutoRegister() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('c');
            if(code) {
                const snaps = await getDocs(collectionGroup(db, 'sessions'));
                let target = null;
                snaps.forEach(d => { if(d.data().code === code) target = d; });
                if(target) {
                    const s = target.data();
                    if(!s.attendees.some(a => a.id === userProfile.id)) {
                        const updated = [...s.attendees, { name: userProfile.name, id: userProfile.id, time: new Date().toLocaleTimeString() }];
                        await updateDoc(target.ref, { attendees: updated });
                        document.getElementById('student-status').innerHTML = `<div class="bg-green-500/20 p-6 rounded-3xl border border-green-500/30"><p class="text-white font-black text-lg uppercase">¡ASISTENCIA EXITOSA!</p><p class="text-green-300 text-[10px] font-bold uppercase mt-2">${s.course}</p></div>`;
                    } else {
                        document.getElementById('student-status').innerHTML = `<p class="text-amber-400 font-black uppercase text-[11px]">Ya estabas registrado en esta clase</p>`;
                    }
                    // Limpiar URL después de registrar
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }
        }

        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('app-container').scrollTop = 0;
        };

        window.toggleAuthMode = (mode) => {
            window.authMode = mode;
            document.getElementById('reg-fields').classList.toggle('hidden', mode !== 'register');
            document.getElementById('btn-mode-login').classList.toggle('bg-white', mode === 'login');
            document.getElementById('btn-mode-register').classList.toggle('bg-white', mode === 'register');
        };

        window.handleAuth = async () => {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            try {
                if(window.authMode === 'register') {
                    const name = document.getElementById('authName').value.toUpperCase();
                    const id = document.getElementById('authId').value.toUpperCase();
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, 'artifacts', APP_ID, 'users', res.user.uid, 'profile', 'info'), { name, id, email, role: window.userRole });
                } else { await signInWithEmailAndPassword(auth, email, pass); }
            } catch(e) { alert("Credenciales incorrectas."); }
        };

        window.prepareAuth = (role) => {
            window.userRole = role;
            document.getElementById('authEmail').value = (role === 'admin') ? ADMIN_MAIL : "";
            switchView('auth');
        };

        window.logout = () => signOut(auth).then(() => location.href = window.location.pathname);

        window.showQR = (code, course) => {
            document.getElementById('qr-code-text').innerText = code;
            document.getElementById('qr-course-text').innerText = course;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById('qrcode'), { text: `${window.location.origin}${window.location.pathname}?c=${code}`, width: 180, height: 180 });
            document.getElementById('modal-qr').classList.remove('hidden');
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        start();
    </script>
</body>
</html>
