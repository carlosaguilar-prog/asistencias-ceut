<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CEUT | MASTER MANAGEMENT V21</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --ceut-blue: #1e40af; 
            --ceut-gold: #d4af37; 
            --bg-slate: #f8fafc;
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; background-color: var(--bg-slate); font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; height: 100%; overflow-x: hidden; }

        .view-section { display: none; width: 100%; min-height: 100vh; flex-direction: column; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .view-section.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .input-ceut {
            width: 100%; padding: 0.8rem 1rem; border: 2px solid #e2e8f0; border-radius: 14px; 
            font-size: 13px; font-weight: 600; transition: all 0.2s; background: white;
        }
        .input-ceut:focus { border-color: var(--ceut-blue); box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1); }

        .btn-primary {
            background: var(--ceut-blue); color: white; padding: 1.1rem; border-radius: 20px; font-weight: 800;
            font-size: 11px; text-transform: uppercase; border: none; cursor: pointer; width: 100%;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 25px -5px rgba(30, 64, 175, 0.3);
        }
        .btn-primary:active { transform: scale(0.95); }

        .card-glass { background: white; border: 1px solid #e2e8f0; border-radius: 2.5rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #0f172a; color: white; padding: 12px 24px; border-radius: 50px;
            font-size: 11px; font-weight: 800; z-index: 10000; display: none;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="toast">MENSAJE</div>

    <!-- MODAL EDICIÓN CLASE -->
    <div id="modal-edit-class" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[10000] hidden items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-black mb-6 flex items-center gap-3"><i data-lucide="edit-3" class="text-blue-600"></i> EDITAR CLASE</h3>
            <div class="space-y-3">
                <input type="hidden" id="editClassId">
                <input type="text" id="editClassName" placeholder="MATERIA" class="input-ceut uppercase">
                <select id="editClassLevel" class="input-ceut">
                    <option value="PREPARATORIA">PREPARATORIA</option>
                    <option value="UNIVERSIDAD">UNIVERSIDAD</option>
                    <option value="POSTGRADO">POSTGRADO</option>
                </select>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="editClassDegree" placeholder="GRADO" class="input-ceut uppercase">
                    <input type="text" id="editClassGroup" placeholder="GRUPO" class="input-ceut uppercase">
                </div>
                <input type="text" id="editClassCareer" placeholder="CARRERA" class="input-ceut uppercase">
                <select id="editClassMode" class="input-ceut">
                    <option value="ESCOLARIZADA">ESCOLARIZADA</option>
                    <option value="MIXTA">MIXTA</option>
                </select>
                <div class="flex gap-3 mt-6">
                    <button onclick="closeClassModal()" class="flex-1 py-4 font-bold text-slate-400 uppercase text-[10px]">Cancelar</button>
                    <button id="btn-save-edit" class="flex-1 btn-primary py-4">Actualizar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-container">
        <!-- INICIO -->
        <main id="view-home" class="view-section active items-center justify-center p-8 bg-white">
             <div class="max-w-xs w-full text-center">
                <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-24 mx-auto mb-10 drop-shadow-2xl" alt="Logo">
                <h1 class="text-4xl font-black mb-10 text-slate-950 tracking-tighter italic">CEUT CLOUD</h1>
                <div class="space-y-4">
                    <button onclick="initFlow('admin')" class="btn-primary bg-slate-900">🛡️ ADMINISTRADOR</button>
                    <button onclick="initFlow('teacher')" class="btn-primary bg-blue-50 !text-blue-900 border border-blue-100 shadow-none">👨‍🏫 DOCENTE</button>
                    <button onclick="initFlow('student')" class="btn-primary py-4">🎓 ESTUDIANTE</button>
                </div>
             </div>
        </main>

        <!-- AUTH -->
        <section id="view-auth" class="view-section p-8 items-center justify-center bg-slate-50">
            <div class="w-full max-w-sm">
                <button onclick="switchView('home')" class="mb-10 text-[10px] font-black text-slate-400 uppercase flex items-center gap-3">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> REGRESAR
                </button>
                <h2 class="text-3xl font-black mb-2 uppercase text-slate-900 tracking-tighter italic">REGISTRO ÚNICO</h2>
                <p class="text-[10px] font-bold text-slate-400 mb-8 uppercase tracking-widest">Credenciales del sistema</p>
                
                <div class="space-y-4">
                    <div id="reg-fields" class="space-y-4">
                        <input type="text" id="authName" placeholder="NOMBRE COMPLETO" class="input-ceut uppercase">
                        <input type="text" id="authId" placeholder="MATRÍCULA / ID" class="input-ceut uppercase">
                    </div>
                    <input type="email" id="authEmail" placeholder="correo@ceut.edu.mx" class="input-ceut">
                    <input type="password" id="authPass" placeholder="CONTRASEÑA" class="input-ceut">
                    <button id="btn-submit-auth" class="btn-primary mt-6 py-5 italic tracking-tighter">INICIAR SESIÓN</button>
                </div>
            </div>
        </section>

        <!-- PANEL ESTUDIANTE -->
        <section id="view-student" class="view-section p-6 bg-slate-50 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-black text-xs">ST</div>
                    <div>
                        <p id="std-name-display" class="text-sm font-black uppercase text-slate-900 leading-none">...</p>
                        <span id="std-id-display" class="text-[9px] font-black text-blue-600 uppercase tracking-widest">ID: ---</span>
                    </div>
                </div>
                <button onclick="handleLogout()" class="text-rose-500 p-2"><i data-lucide="log-out"></i></button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card-glass p-8">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-6 tracking-widest">INSCRIBIR MATERIA</h3>
                    <div class="flex gap-2">
                        <input type="text" id="joinClassId" placeholder="CÓDIGO (CLS-XXXX)" class="input-ceut uppercase">
                        <button onclick="joinClass()" class="bg-blue-600 text-white px-6 rounded-2xl font-black text-[10px]">UNIRSE</button>
                    </div>
                </div>
                <div class="card-glass p-8 md:row-span-2">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-6 tracking-widest">MIS ASISTENCIAS (VISUALIZACIÓN)</h3>
                    <div id="student-classes-list" class="space-y-4"></div>
                </div>
            </div>
        </section>

        <!-- PANEL DOCENTE (CONTROL INTERNO) -->
        <section id="view-teacher" class="view-section p-6 bg-slate-50 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-4">
                    <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-10" alt="Logo">
                    <div>
                        <p id="prof-name" class="text-sm font-black uppercase text-slate-900 leading-none">...</p>
                        <span class="text-blue-600 text-[9px] font-black uppercase tracking-widest italic">GESTIÓN INTERNA DOCENTE</span>
                    </div>
                </div>
                <button onclick="handleLogout()" class="text-rose-500 p-2"><i data-lucide="log-out"></i></button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <!-- FORMULARIO DE REGISTRO DE CLASE -->
                <div class="lg:col-span-4 card-glass p-8 h-fit">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-6 tracking-widest flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> NUEVA MATERIA
                    </h3>
                    <div class="space-y-3">
                        <input type="text" id="classMat" placeholder="NOMBRE DE LA MATERIA" class="input-ceut uppercase">
                        <select id="classLev" class="input-ceut">
                            <option value="PREPARATORIA">NIVEL: PREPARATORIA</option>
                            <option value="UNIVERSIDAD">NIVEL: UNIVERSIDAD</option>
                            <option value="POSTGRADO">NIVEL: POSTGRADO</option>
                        </select>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="classDeg" placeholder="GRADO" class="input-ceut uppercase">
                            <input type="text" id="classGru" placeholder="GRUPO" class="input-ceut uppercase">
                        </div>
                        <input type="text" id="classCar" placeholder="CARRERA" class="input-ceut uppercase">
                        <select id="classMod" class="input-ceut">
                            <option value="ESCOLARIZADA">MOD: ESCOLARIZADA</option>
                            <option value="MIXTA">MOD: MIXTA</option>
                        </select>
                        <button onclick="createNewClass()" class="btn-primary py-4 mt-4 italic">REGISTRAR MATERIA</button>
                    </div>
                </div>

                <!-- DASHBOARD DE CONTROL DE CLASES -->
                <div class="lg:col-span-8 card-glass p-8">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-6 tracking-widest flex items-center gap-2">
                        <i data-lucide="layers" class="w-4 h-4"></i> CONTROL INTERNO DE CLASES
                    </h3>
                    <div id="teacher-classes-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Clases aquí -->
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, where, updateDoc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'ceut_v21_cloud';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let myClasses = [];

        // --- GESTIÓN DOCENTE (CONTROL INTERNO) ---
        window.createNewClass = async () => {
            const mat = document.getElementById('classMat').value.trim();
            const lev = document.getElementById('classLev').value;
            const deg = document.getElementById('classDeg').value.trim();
            const gru = document.getElementById('classGru').value.trim();
            const car = document.getElementById('classCar').value.trim();
            const mod = document.getElementById('classMod').value;

            if(!mat || !lev || !deg || !gru || !car || !mod) return window.showToast("⚠️ COMPLETE EL REGISTRO");

            const classId = `CLS-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;
            const classData = {
                id: classId,
                name: mat.toUpperCase(),
                level: lev,
                degree: deg.toUpperCase(),
                group: gru.toUpperCase(),
                career: car.toUpperCase(),
                mode: mod,
                teacher: currentUser.name,
                teacherId: currentUser.uid,
                createdAt: Date.now(),
                isOpen: true
            };

            await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'classes', classId), classData);
            window.showToast("✅ CLASE CREADA EXITOSAMENTE");
            document.getElementById('classMat').value = "";
        };

        window.deleteClass = async (id) => {
            if(confirm("¿ELIMINAR ESTA MATERIA? Se perderán todos los registros asociados.")) {
                await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'classes', id));
                window.showToast("🗑️ MATERIA ELIMINADA");
            }
        };

        window.openEditModal = (id) => {
            const c = myClasses.find(x => x.id === id);
            if(!c) return;
            document.getElementById('editClassId').value = c.id;
            document.getElementById('editClassName').value = c.name;
            document.getElementById('editClassLevel').value = c.level;
            document.getElementById('editClassDegree').value = c.degree;
            document.getElementById('editClassGroup').value = c.group;
            document.getElementById('editClassCareer').value = c.career;
            document.getElementById('editClassMode').value = c.mode;
            document.getElementById('modal-edit-class').classList.replace('hidden', 'flex');
        };

        window.closeClassModal = () => document.getElementById('modal-edit-class').classList.replace('flex', 'hidden');

        document.getElementById('btn-save-edit').onclick = async () => {
            const id = document.getElementById('editClassId').value;
            const upData = {
                name: document.getElementById('editClassName').value.toUpperCase(),
                level: document.getElementById('editClassLevel').value,
                degree: document.getElementById('editClassDegree').value.toUpperCase(),
                group: document.getElementById('editClassGroup').value.toUpperCase(),
                career: document.getElementById('editClassCareer').value.toUpperCase(),
                mode: document.getElementById('editClassMode').value
            };
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'classes', id), upData);
            window.showToast("✅ DATOS ACTUALIZADOS");
            window.closeClassModal();
        };

        function renderTeacherDashboard(classes) {
            myClasses = classes;
            const container = document.getElementById('teacher-classes-list');
            if(classes.length === 0) {
                container.innerHTML = `<div class="col-span-full py-10 text-center opacity-40 font-bold text-xs">NO HAY CLASES REGISTRADAS</div>`;
                return;
            }

            container.innerHTML = classes.map(c => `
                <div class="p-6 bg-slate-900 rounded-[2rem] text-white border border-white/5 relative overflow-hidden group">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[7px] font-black bg-blue-600 px-3 py-1 rounded-full uppercase tracking-widest">${c.mode}</span>
                        <div class="flex gap-2">
                             <button onclick="window.openEditModal('${c.id}')" class="p-2 hover:bg-white/10 rounded-full transition-all text-blue-400"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                             <button onclick="window.deleteClass('${c.id}')" class="p-2 hover:bg-rose-500/20 rounded-full transition-all text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <h4 class="font-black text-lg leading-tight uppercase mb-1">${c.name}</h4>
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-4">${c.level} | ${c.career}</p>
                    <div class="flex justify-between items-end mt-6">
                        <div>
                            <p class="text-[10px] font-black text-[#d4af37] tracking-tighter">CÓDIGO: ${c.id}</p>
                            <p class="text-[8px] opacity-40 font-bold">${c.degree} - ${c.group}</p>
                        </div>
                        <button onclick="window.showToast('ID CLASE: ${c.id}')" class="bg-white/10 p-3 rounded-2xl group-hover:bg-blue-600 transition-all">
                            <i data-lucide="qr-code" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- LÓGICA ALUMNO ---
        window.joinClass = async () => {
            const cid = document.getElementById('joinClassId').value.trim().toUpperCase();
            if(!cid) return window.showToast("⚠️ INGRESE CÓDIGO");

            const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'classes', cid));
            if(!snap.exists()) return window.showToast("❌ CÓDIGO INVÁLIDO");

            await updateDoc(doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'profile', 'info'), {
                classes: arrayUnion(cid)
            });
            window.showToast("✅ INSCRITO CORRECTAMENTE");
            document.getElementById('joinClassId').value = "";
        };

        async function refreshStudentList(cids) {
            const container = document.getElementById('student-classes-list');
            if(!cids || cids.length === 0) {
                container.innerHTML = `<p class="text-center py-10 opacity-40 text-[10px] font-bold">SIN MATERIAS INSCRITAS</p>`;
                return;
            }
            container.innerHTML = "";
            for(const id of cids) {
                const s = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'classes', id));
                if(s.exists()){
                    const c = s.data();
                    container.innerHTML += `
                        <div class="p-5 bg-slate-50 border border-slate-200 rounded-3xl">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="font-black text-slate-900 uppercase text-[12px]">${c.name}</h4>
                                    <p class="text-[8px] text-blue-600 font-bold uppercase tracking-widest">${c.level} | ${c.career}</p>
                                </div>
                                <span class="text-[8px] font-black opacity-30"># ${id}</span>
                            </div>
                            <div class="mt-4 pt-3 border-t border-slate-200/50 flex justify-between items-center">
                                <span class="text-[8px] font-black text-slate-400 uppercase italic">Prof: ${c.teacher}</span>
                                <button onclick="window.showToast('VISTA DE ASISTENCIAS CARGANDO...')" class="text-blue-700 font-black text-[9px] uppercase italic">Ver Historial →</button>
                            </div>
                        </div>
                    `;
                }
            }
        }

        // --- AUTH & INITIALIZATION ---
        document.getElementById('btn-submit-auth').onclick = async () => {
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value.trim();
            const name = document.getElementById('authName').value.trim();
            const id = document.getElementById('authId').value.trim();

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                if(name && id) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    const userData = { uid: res.user.uid, name: name.toUpperCase(), id: id.toUpperCase(), email, role: window.selectedRole, classes: [], date: Date.now() };
                    await setDoc(doc(db, 'artifacts', APP_ID, 'users', res.user.uid, 'profile', 'info'), userData);
                    await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', res.user.uid), userData);
                    window.showToast("🚀 REGISTRO COMPLETADO");
                } else window.showToast("❌ ERROR: DATOS REQUERIDOS");
            }
        };

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'users', u.uid, 'profile', 'info'));
                currentUser = snap.data();
                
                if(currentUser.role === 'student') {
                    document.getElementById('std-name-display').innerText = currentUser.name;
                    document.getElementById('std-id-display').innerText = `ID: ${currentUser.id}`;
                    refreshStudentList(currentUser.classes);
                    window.switchView('student');
                } else {
                    document.getElementById('prof-name').innerText = currentUser.name;
                    const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'classes'), where("teacherId", "==", u.uid));
                    onSnapshot(q, s => renderTeacherDashboard(s.docs.map(d => d.data())));
                    window.switchView('teacher');
                }
            } else window.switchView('home');
        });

        window.handleLogout = () => signOut(auth);
        window.selectedRole = 'student';
        window.initFlow = (r) => { window.selectedRole = r; window.switchView('auth'); };
        window.switchView = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            lucide.createIcons();
        };
        window.showToast = (m) => {
            const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        };
    </script>
</body>
</html>
