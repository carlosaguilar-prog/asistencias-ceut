<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEUT | Sistema Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --ceut-navy: #020617;
            --ceut-gold: #f5b800;
        }
        body { 
            background: radial-gradient(circle at top right, #1e3a8a, #020617);
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-10px);
            border-color: var(--ceut-gold);
            background: rgba(255, 255, 255, 0.07);
        }
        .logo-glow {
            filter: drop-shadow(0 0 20px rgba(245, 184, 0, 0.3));
        }
    </style>
</head>
<body class="p-6">

    <div class="text-center mb-16">
        <!-- Logo Institucional -->
        <img src="Gemini_Generated_Image_ob1grpob1grpob1g-removebg-preview.png" alt="Logo CEUT" class="h-40 mx-auto mb-6 logo-glow" onerror="this.src='https://ui-avatars.com/api/?name=CEUT&background=f5b800&color=020617&size=200'">
        <h1 class="text-5xl font-black italic uppercase tracking-tighter leading-none">Sistema <span class="text-yellow-500">Integral</span></h1>
        <p class="text-[10px] font-bold opacity-40 uppercase tracking-[0.5em] mt-4">Centro Universitario de Tehuacán</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl w-full">
        <!-- Acceso Alumnos -->
        <a href="alumno.html" class="glass-card p-10 rounded-[3.5rem] text-center group">
            <div class="w-20 h-20 bg-yellow-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform text-yellow-500">
                <i data-lucide="graduation-cap" class="w-10 h-10"></i>
            </div>
            <h3 class="text-2xl font-black italic uppercase mb-2">Alumnos</h3>
            <p class="text-[10px] opacity-40 font-bold uppercase">Credencial y QR</p>
        </a>

        <!-- Acceso Maestros -->
        <a href="maestro.html" class="glass-card p-10 rounded-[3.5rem] text-center group border-b-4 border-b-yellow-500">
            <div class="w-20 h-20 bg-yellow-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform text-yellow-500">
                <i data-lucide="presentation" class="w-10 h-10"></i>
            </div>
            <h3 class="text-2xl font-black italic uppercase mb-2">Maestros</h3>
            <p class="text-[10px] opacity-40 font-bold uppercase">Pase de Lista</p>
        </a>

        <!-- Acceso Admin -->
        <a href="admin.html" class="glass-card p-10 rounded-[3.5rem] text-center group">
            <div class="w-20 h-20 bg-yellow-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform text-yellow-500">
                <i data-lucide="shield-check" class="w-10 h-10"></i>
            </div>
            <h3 class="text-2xl font-black italic uppercase mb-2">Admin</h3>
            <p class="text-[10px] opacity-40 font-bold uppercase">Panel de Control</p>
        </a>
    </div>

    <footer class="mt-20 opacity-20 text-[9px] font-black uppercase tracking-[0.3em]">
        © 2024 CEUT Tehuacán • Excelencia Educativa
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
