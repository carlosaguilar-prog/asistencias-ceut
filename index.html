<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEUT | Sistema Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background: radial-gradient(circle at top right, #1e3a8a, #020617);
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white; min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-10px);
            border-color: #f5b800;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        }
        .logo-ceut {
            height: 180px;
            filter: drop-shadow(0 0 40px rgba(245, 184, 0, 0.25));
        }
    </style>
</head>
<body class="p-6">
    <div class="text-center mb-14">
        <img src="Gemini_Generated_Image_ob1grpob1grpob1g-removebg-preview.png" class="logo-ceut mx-auto mb-8" alt="Logo CEUT">
        <h1 class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter leading-none text-white">Sistema <span class="text-yellow-500">Integral</span></h1>
        <p class="text-[10px] md:text-xs font-bold opacity-40 uppercase tracking-[0.6em] mt-4">Centro Universitario de Tehuacán</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl w-full">
        <div class="glass-card p-10 rounded-[3.5rem] text-center group">
            <div class="w-16 h-16 bg-yellow-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 text-yellow-500"><i data-lucide="graduation-cap"></i></div>
            <h3 class="text-2xl font-black italic uppercase mb-2 text-white">Alumnos</h3>
            <p class="text-[10px] opacity-40 font-bold uppercase tracking-widest">Credencial & QR</p>
        </div>
        <div class="glass-card p-10 rounded-[3.5rem] text-center group border-b-4 border-b-yellow-500">
            <div class="w-16 h-16 bg-yellow-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 text-yellow-500"><i data-lucide="presentation"></i></div>
            <h3 class="text-2xl font-black italic uppercase mb-2 text-white">Maestros</h3>
            <p class="text-[10px] opacity-40 font-bold uppercase tracking-widest">Pase de Lista</p>
        </div>
        <div class="glass-card p-10 rounded-[3.5rem] text-center group">
            <div class="w-16 h-16 bg-yellow-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 text-yellow-500"><i data-lucide="shield-check"></i></div>
            <h3 class="text-2xl font-black italic uppercase mb-2 text-white">Admin</h3>
            <p class="text-[10px] opacity-40 font-bold uppercase tracking-widest">Gestión Global</p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
