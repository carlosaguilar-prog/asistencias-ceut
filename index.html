<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEUT | Sistema Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --ceut-blue-dark: #000b21;
            --ceut-blue-light: #1e1b4b;
            --ceut-gold: #eab308;
        }
        body { 
            background: radial-gradient(circle at center, var(--ceut-blue-light), var(--ceut-blue-dark));
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .menu-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            border-color: var(--ceut-gold);
            background: rgba(234, 179, 8, 0.05);
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl w-full">
        <div class="text-center mb-12">
            <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-24 mx-auto mb-6" alt="Logo">
            <h1 class="text-4xl font-black uppercase italic italic tracking-tighter">Sistema Integral <span class="text-yellow-500">CEUT</span></h1>
            <p class="opacity-50 text-sm mt-2 uppercase tracking-[0.3em]">Seleccione su portal de acceso</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Admin -->
            <a href="admin.html" class="menu-card p-8 rounded-3xl text-center group">
                <div class="w-16 h-16 bg-red-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition">
                    <i data-lucide="shield-check" class="w-8 h-8 text-red-500"></i>
                </div>
                <h2 class="text-xl font-bold uppercase italic italic mb-2">Administrativo</h2>
                <p class="text-[10px] opacity-40 uppercase">Control de usuarios y reportes generales</p>
            </a>

            <!-- Docente -->
            <a href="docente.html" class="menu-card p-8 rounded-3xl text-center group">
                <div class="w-16 h-16 bg-yellow-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition">
                    <i data-lucide="graduation-cap" class="w-8 h-8 text-yellow-500"></i>
                </div>
                <h2 class="text-xl font-bold uppercase italic italic mb-2 text-yellow-500">Docente</h2>
                <p class="text-[10px] opacity-40 uppercase">Gestión de clases y pase de lista</p>
            </a>

            <!-- Alumno -->
            <a href="alumno.html" class="menu-card p-8 rounded-3xl text-center group">
                <div class="w-16 h-16 bg-blue-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition">
                    <i data-lucide="user" class="w-8 h-8 text-blue-500"></i>
                </div>
                <h2 class="text-xl font-bold uppercase italic italic mb-2 text-blue-400">Alumno</h2>
                <p class="text-[10px] opacity-40 uppercase">Registro de asistencia y datos</p>
            </a>
        </div>
        
        <p class="text-center mt-16 text-[9px] opacity-30 uppercase tracking-widest font-bold">Centro Universitario de Tehuacán © 2024</p>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
