<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEUT | Consola de Control Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Librerías para Exportación -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>

    <style>
        :root {
            --ceut-blue: #3b4ba4;
            --ceut-blue-dark: #000b21;
            --ceut-gold: #eab308;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--ceut-blue-dark); 
            color: white; 
            min-height: 100vh;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .tab-btn {
            padding: 1rem;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            opacity: 0.5;
        }

        .tab-btn.active {
            opacity: 1;
            color: var(--ceut-gold);
            border-bottom-color: var(--ceut-gold);
            background: rgba(234, 179, 8, 0.05);
        }

        .input-ceut { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 0.5rem; 
            color: white; 
            padding: 0.6rem 1rem;
            width: 100%;
            font-size: 0.85rem;
        }

        .input-ceut:focus { border-color: var(--ceut-gold); outline: none; }

        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-delete { color: #f87171; background: rgba(248, 113, 113, 0.1); }
        .btn-delete:hover { background: #f87171; color: white; }

        .btn-export { background: var(--ceut-gold); color: black; }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Pantalla de Bloqueo de Seguridad -->
    <div id="auth-lock" class="fixed inset-0 z-50 bg-[#000b21] flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-32 mx-auto mb-8" alt="Logo">
            <div class="glass-card p-8 rounded-3xl border-t-4 border-yellow-500">
                <h2 class="text-xl font-black uppercase italic mb-6">Acceso <span class="text-yellow-500">Administrativo</span></h2>
                <div class="space-y-4">
                    <input type="email" id="admin-email" placeholder="CORREO@CEUT.EDU.MX" class="input-ceut">
                    <input type="password" id="admin-pass" placeholder="••••••••" class="input-ceut">
                    <button onclick="loginAdmin()" class="w-full py-4 bg-yellow-500 text-black font-black uppercase italic rounded-xl shadow-lg shadow-yellow-500/20">Desbloquear Consola</button>
                </div>
                <p class="mt-6 text-[9px] text-slate-500 uppercase tracking-widest">Uso exclusivo para personal autorizado CEUT</p>
            </div>
        </div>
    </div>

    <!-- Panel Principal -->
    <div id="admin-panel" class="hidden">
        <!-- Header -->
        <header class="bg-[#000d2b] border-b border-white/10 p-4 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-12">
                    <div>
                        <h1 class="text-sm font-black uppercase italic">Consola de <span class="text-yellow-500">Control</span></h1>
                        <p id="admin-user-tag" class="text-[9px] opacity-50 font-bold uppercase"></p>
                    </div>
                </div>
                <button onclick="logout()" class="p-2 bg-white/5 rounded-lg text-rose-500 hover:bg-rose-500/10">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <!-- Estadísticas Rápidas -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="glass-card p-5 rounded-2xl border-l-4 border-blue-500">
                    <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Asistencias Hoy</p>
                    <h3 id="stat-asistencias" class="text-2xl font-black">0</h3>
                </div>
                <div class="glass-card p-5 rounded-2xl border-l-4 border-yellow-500">
                    <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Total Alumnos</p>
                    <h3 id="stat-alumnos" class="text-2xl font-black">0</h3>
                </div>
                <div class="glass-card p-5 rounded-2xl border-l-4 border-green-500">
                    <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Docentes Activos</p>
                    <h3 id="stat-docentes" class="text-2xl font-black">0</h3>
                </div>
                <div class="glass-card p-5 rounded-2xl border-l-4 border-purple-500">
                    <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Clases en Vivo</p>
                    <h3 id="stat-clases" class="text-2xl font-black">0</h3>
                </div>
            </div>

            <!-- Navegación y Buscador -->
            <div class="flex flex-col md:flex-row justify-between items-end gap-4 mb-6">
                <div class="flex bg-white/5 p-1 rounded-xl w-full md:w-auto">
                    <button onclick="changeTab('asistencias')" id="tab-asistencias" class="tab-btn flex-1 md:flex-none active">Asistencias</button>
                    <button onclick="changeTab('alumnos')" id="tab-alumnos" class="tab-btn flex-1 md:flex-none">Alumnos</button>
                    <button onclick="changeTab('docentes')" id="tab-docentes" class="tab-btn flex-1 md:flex-none">Docentes</button>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <div class="relative flex-grow">
                        <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-500"></i>
                        <input type="text" id="table-search" placeholder="Buscar registros..." class="input-ceut pl-10">
                    </div>
                    <button onclick="exportToPDF()" class="btn-action btn-export">
                        <i data-lucide="file-down" class="w-4 h-4"></i> PDF
                    </button>
                </div>
            </div>

            <!-- Tabla de Datos -->
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead id="table-head" class="bg-white/5 border-b border-white/10 text-[9px] font-black uppercase text-slate-500">
                            <!-- Inyectado dinámicamente -->
                        </thead>
                        <tbody id="table-body" class="divide-y divide-white/5 text-[10px] font-bold uppercase italic">
                            <!-- Inyectado dinámicamente -->
                        </tbody>
                    </table>
                </div>
                <div id="loading-state" class="p-20 text-center flex flex-col items-center opacity-30">
                    <i data-lucide="refresh-cw" class="w-10 h-10 animate-spin mb-4"></i>
                    <p class="text-xs font-black uppercase">Cargando base de datos...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCefP6qEqaCMpo8ZpUiLpN4e_-E4ZNTp94",
            authDomain: "asistencias-ceut.firebaseapp.com",
            projectId: "asistencias-ceut",
            storageBucket: "asistencias-ceut.firebasestorage.app",
            messagingSenderId: "130615246146",
            appId: "1:130615246146:web:6ae2c17c828fb28a809cdb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = 'ceut-prod-v2';

        let currentTab = 'asistencias';
        let currentData = [];
        let unsubscribe = null;

        // Manejo de Autenticación
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-lock').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-user-tag').innerText = `Sesión: ${user.email}`;
                loadData();
                initStats();
            } else {
                document.getElementById('auth-lock').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
            lucide.createIcons();
        });

        async function loginAdmin() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                alert("Credenciales incorrectas o sin privilegios de administrador.");
            }
        }

        function logout() {
            auth.signOut();
        }

        // Cambio de pestañas
        function changeTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            loadData();
        }

        // Carga de Datos en tiempo real
        function loadData() {
            if (unsubscribe) unsubscribe();
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('table-body').innerHTML = "";

            let collectionName = '';
            if (currentTab === 'asistencias') collectionName = 'asistencias';
            if (currentTab === 'alumnos') collectionName = 'students_registry';
            if (currentTab === 'docentes') collectionName = 'teachers_registry';

            unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data')
                .collection(collectionName)
                .onSnapshot(snap => {
                    document.getElementById('loading-state').classList.add('hidden');
                    currentData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderTable();
                });
        }

        function renderTable() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            const term = document.getElementById('table-search').value.toLowerCase();

            const filtered = currentData.filter(item => 
                JSON.stringify(item).toLowerCase().includes(term)
            );

            body.innerHTML = "";

            if (currentTab === 'asistencias') {
                head.innerHTML = `<tr><th class="p-4">Fecha</th><th class="p-4">Alumno/Folio</th><th class="p-4">Materia</th><th class="p-4">Docente</th><th class="p-4">Acciones</th></tr>`;
                filtered.sort((a,b) => b.ts - a.ts).forEach(item => {
                    body.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="p-4">${new Date(item.ts).toLocaleString()}</td>
                            <td class="p-4"><span class="text-yellow-500">${item.folio}</span><br>${item.studentName}</td>
                            <td class="p-4">${item.className}</td>
                            <td class="p-4 opacity-60">${item.profName}</td>
                            <td class="p-4">
                                <button onclick="deleteRecord('asistencias', '${item.id}')" class="btn-action btn-delete">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i> Borrar
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } else if (currentTab === 'alumnos') {
                head.innerHTML = `<tr><th class="p-4">Folio</th><th class="p-4">Nombre</th><th class="p-4">Carrera</th><th class="p-4">Email</th><th class="p-4">Acciones</th></tr>`;
                filtered.forEach(item => {
                    body.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="p-4 font-black text-yellow-500">${item.folio}</td>
                            <td class="p-4">${item.name}</td>
                            <td class="p-4 text-blue-400">${item.career}</td>
                            <td class="p-4 opacity-50 lowercase font-normal">${item.email}</td>
                            <td class="p-4">
                                <button onclick="deleteRecord('students_registry', '${item.id}')" class="btn-action btn-delete">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i> Baja
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } else if (currentTab === 'docentes') {
                head.innerHTML = `<tr><th class="p-4">ID Docente</th><th class="p-4">Nombre</th><th class="p-4">Email</th><th class="p-4">Acciones</th></tr>`;
                filtered.forEach(item => {
                    body.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="p-4 font-black text-yellow-500">${item.id}</td>
                            <td class="p-4">${item.nombre}</td>
                            <td class="p-4 opacity-50 lowercase font-normal">${item.email}</td>
                            <td class="p-4">
                                <button onclick="deleteRecord('teachers_registry', '${item.id}')" class="btn-action btn-delete">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i> Revocar
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            lucide.createIcons();
        }

        async function deleteRecord(col, id) {
            if (!confirm("¿Está seguro de eliminar este registro? Esta acción no se puede deshacer.")) return;
            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data')
                        .collection(col).doc(id).delete();
            } catch (e) {
                alert("Error al eliminar el registro.");
            }
        }

        function initStats() {
            const root = db.collection('artifacts').doc(appId).collection('public').doc('data');
            
            // Stats Asistencias Hoy
            const startOfToday = new Date().setHours(0,0,0,0);
            root.collection('asistencias').where('ts', '>=', startOfToday).onSnapshot(snap => {
                document.getElementById('stat-asistencias').innerText = snap.size;
            });

            // Stats Alumnos
            root.collection('students_registry').onSnapshot(snap => {
                document.getElementById('stat-alumnos').innerText = snap.size;
            });

            // Stats Docentes
            root.collection('teachers_registry').onSnapshot(snap => {
                document.getElementById('stat-docentes').innerText = snap.size;
            });

            // Stats Clases Activas
            root.collection('active_pins').onSnapshot(snap => {
                document.getElementById('stat-clases').innerText = snap.size;
            });
        }

        // Exportar a PDF usando jsPDF
        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            
            doc.setFillColor(0, 11, 33);
            doc.rect(0, 0, 297, 30, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(20);
            doc.text("CEUT - REPORTE DE " + currentTab.toUpperCase(), 14, 20);
            
            doc.setFontSize(10);
            doc.text("FECHA DE EMISIÓN: " + new Date().toLocaleString(), 230, 20);

            const headers = currentTab === 'asistencias' ? 
                [['FECHA', 'FOLIO', 'ALUMNO', 'MATERIA', 'DOCENTE']] : 
                currentTab === 'alumnos' ? 
                [['FOLIO', 'NOMBRE', 'CARRERA', 'EMAIL']] : 
                [['ID', 'NOMBRE', 'EMAIL']];

            const rows = currentData.map(item => {
                if (currentTab === 'asistencias') return [new Date(item.ts).toLocaleString(), item.folio, item.studentName, item.className, item.profName];
                if (currentTab === 'alumnos') return [item.folio, item.name, item.career, item.email];
                if (currentTab === 'docentes') return [item.id, item.nombre, item.email];
            });

            doc.autoTable({
                head: headers,
                body: rows,
                startY: 40,
                theme: 'grid',
                headStyles: { fillColor: [59, 75, 164] },
                styles: { fontSize: 8 }
            });

            doc.save(`CEUT_Reporte_${currentTab}_${Date.now()}.pdf`);
        }

        document.getElementById('table-search').oninput = renderTable;
    </script>
</body>
</html>
