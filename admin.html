<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEUT | Panel Administrativo Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000b21; color: white; overflow-x: hidden; }
        .tiger-gradient { background: linear-gradient(135deg, #3b4ba4 0%, #1e296b 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .admin-badge { background: linear-gradient(90deg, #eab308 0%, #ca8a04 100%); color: black; }
        .input-ceut { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(234, 179, 8, 0.2); border-radius: 1rem; padding: 12px; color: white; width: 100%; font-size: 0.8rem; transition: all 0.3s; }
        .input-ceut:focus { border-color: #eab308; outline: none; background: rgba(234, 179, 8, 0.1); }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- PANTALLA DE LOGIN -->
    <div id="security-lock" class="fixed inset-0 z-[100] bg-[#000b21] flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-8">
            <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" alt="CEUT Logo" class="w-48 mx-auto mb-6">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-yellow-500/10 border border-yellow-500/20 rounded-full">
                <i data-lucide="shield-lock" class="w-4 h-4 text-yellow-500"></i>
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-yellow-500 italic">Acceso Restringido</span>
            </div>
        </div>
        
        <div class="w-full max-w-sm space-y-6">
            <form id="admin-login-form" class="space-y-4">
                <input type="email" id="admin-email" required placeholder="carlos.aguilar@ceut.edu.mx" class="input-ceut w-full">
                <input type="password" id="admin-password" required placeholder="Contraseña" class="input-ceut w-full">
                <div id="login-error" class="hidden text-rose-500 text-[10px] font-black uppercase italic bg-rose-500/10 py-3 px-4 rounded-lg"></div>
                <button type="submit" id="login-btn" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase italic text-xs hover:scale-105 transition-all">
                    Entrar al Sistema
                </button>
            </form>
            <a href="index.html" class="text-slate-500 text-[10px] font-black uppercase">Volver al Inicio</a>
        </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="admin-interface" class="hidden fade-in">
        <nav class="w-full tiger-gradient p-6 border-b-4 border-yellow-500 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-24" alt="CEUT Logo">
                    <h1 class="text-lg font-black italic uppercase">Panel Administrativo</h1>
                </div>
                <button id="logout-btn" class="p-3 glass rounded-2xl text-rose-400"><i data-lucide="log-out"></i></button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 mt-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass p-6 rounded-[2rem] border-l-8 border-yellow-500">
                    <p class="text-[10px] font-black text-slate-500 uppercase">Total Asistencias</p>
                    <h3 id="stat-total" class="text-4xl font-black italic">0</h3>
                </div>
                <div class="glass p-6 rounded-[2rem] border-l-8 border-blue-500">
                    <p class="text-[10px] font-black text-slate-500 uppercase">Sincronización</p>
                    <h3 class="text-xl font-black italic text-green-500">EN LÍNEA</h3>
                </div>
            </div>

            <div class="glass rounded-[2.5rem] overflow-hidden">
                <div class="p-6 border-b border-white/10 flex justify-between items-center">
                    <h2 class="text-sm font-black italic uppercase">Registros de Asistencia</h2>
                    <button id="download-btn" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-bold">Descargar Excel</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 text-[9px] font-black uppercase text-slate-500">
                            <tr>
                                <th class="px-6 py-4">Hora</th>
                                <th class="px-6 py-4">Estudiante</th>
                                <th class="px-6 py-4">Materia</th>
                                <th class="px-6 py-4 text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-body" class="text-[10px] font-bold uppercase italic"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURACIÓN DE TU FIREBASE REAL
        const firebaseConfig = {
            apiKey: "AIzaSyCefP6qEqaCMpo8ZpUiLpN4e_-E4ZNTp94",
            authDomain: "asistencias-ceut.firebaseapp.com",
            projectId: "asistencias-ceut",
            storageBucket: "asistencias-ceut.firebasestorage.app",
            messagingSenderId: "130615246146",
            appId: "1:130615246146:web:6ae2c17c828fb28a809cdb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "asistencias-ceut-prod"; // ID consistente para tus datos
        const ADMIN_EMAIL = "carlos.aguilar@ceut.edu.mx";

        lucide.createIcons();

        // Control de sesión
        auth.onAuthStateChanged(user => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('security-lock').classList.add('hidden');
                document.getElementById('admin-interface').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('security-lock').classList.remove('hidden');
                document.getElementById('admin-interface').classList.add('hidden');
            }
        });

        // Login
        document.getElementById('admin-login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value.trim();
            const pass = document.getElementById('admin-password').value;
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-error');

            if(email !== ADMIN_EMAIL) {
                err.innerText = "Correo no autorizado";
                err.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verificando...";

            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                err.innerText = "Error: " + e.message;
                err.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "Entrar al Sistema";
            }
        };

        // Logout
        document.getElementById('logout-btn').onclick = () => auth.signOut();

        // Carga de datos en tiempo real
        function loadData() {
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('asistencias')
                .onSnapshot(snap => {
                    const tbody = document.getElementById('attendance-body');
                    tbody.innerHTML = "";
                    document.getElementById('stat-total').innerText = snap.size;

                    snap.forEach(doc => {
                        const r = doc.data();
                        const tr = document.createElement('tr');
                        tr.className = "border-b border-white/5";
                        tr.innerHTML = `
                            <td class="px-6 py-4 opacity-50">${new Date(r.ts).toLocaleTimeString()}</td>
                            <td class="px-6 py-4">${r.studentName}<br><span class="text-yellow-500 text-[8px]">${r.studentId}</span></td>
                            <td class="px-6 py-4">${r.className}</td>
                            <td class="px-6 py-4 text-right">
                                <button onclick="deleteRow('${doc.id}')" class="text-rose-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                    lucide.createIcons();
                });
        }

        async function deleteRow(id) {
            if(confirm("¿Eliminar registro?")) {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('asistencias').doc(id).delete();
            }
        }

        document.getElementById('download-btn').onclick = () => {
            let csv = "Fecha,Alumno,Matricula,Materia\n";
            document.querySelectorAll('#attendance-body tr').forEach(tr => {
                const tds = tr.querySelectorAll('td');
                csv += `${tds[0].innerText},${tds[1].innerText.replace('\n', ' ')},${tds[2].innerText}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'asistencias.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
    </script>
</body>
</html>
