<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEUT | Consola de Control Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --ceut-blue: #3b4ba4;
            --ceut-blue-dark: #000b21;
            --ceut-gold: #eab308;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #000b21);
            color: white; min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .tab-btn { position: relative; transition: all 0.3s ease; opacity: 0.5; }
        .tab-btn.active { color: var(--ceut-gold); opacity: 1; }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background: var(--ceut-gold);
        }
        .input-admin {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.6rem 1rem;
            color: white; font-size: 0.8rem;
        }
        .btn-action {
            transition: all 0.2s;
            padding: 6px;
            border-radius: 8px;
        }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .btn-edit:hover { background: rgba(234, 179, 8, 0.2); color: #eab308; }
    </style>
</head>
<body class="p-4 md:p-8">
    
    <!-- Pantalla de Autenticación -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950 p-6">
        <div class="glass-card p-10 rounded-[3rem] max-w-sm w-full text-center border-t-4 border-t-yellow-500">
            <!-- Logo Agregado -->
            <img src="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="h-16 mx-auto mb-6 drop-shadow-lg" alt="Logo CEUT">
            
            <h2 class="text-xl font-black italic uppercase tracking-tighter mb-2">Acceso <span class="text-yellow-500">Administrativo</span></h2>
            <p class="text-[9px] opacity-40 uppercase font-bold mb-8">Personal Autorizado (Área Académica / Mtro. Aguilar)</p>
            
            <div id="login-form" class="space-y-4">
                <input id="auth-email" type="email" placeholder="Correo Institucional" class="input-admin w-full">
                <input id="auth-pass" type="password" placeholder="Contraseña" class="input-admin w-full">
                <button onclick="handleAuth()" class="w-full bg-yellow-500 text-slate-900 py-3 rounded-xl font-black uppercase text-xs">Entrar al Sistema</button>
                <button onclick="toggleRegister(true)" class="text-[8px] uppercase opacity-40 font-bold hover:text-yellow-500">¿Primer ingreso? Registrarse</button>
            </div>

            <div id="register-form" class="hidden space-y-4">
                <select id="reg-name" class="input-admin w-full">
                    <option value="">SELECCIONAR IDENTIDAD</option>
                    <option value="AREA ACADEMICA">ÁREA ACADÉMICA</option>
                    <option value="CARLOS AGUILAR SANCHEZ">MTRO. CARLOS AGUILAR SÁNCHEZ</option>
                </select>
                <input id="reg-email" type="email" placeholder="Correo Autorizado" class="input-admin w-full">
                <input id="reg-pass" type="password" placeholder="Nueva Contraseña" class="input-admin w-full">
                <button onclick="handleRegister()" class="w-full bg-white text-slate-900 py-3 rounded-xl font-black uppercase text-xs">Crear Cuenta Maestra</button>
                <button onclick="toggleRegister(false)" class="text-[8px] uppercase opacity-40 font-bold">Volver</button>
            </div>
        </div>
    </div>

    <!-- Panel Principal -->
    <div id="main-panel" class="hidden max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
            <div class="flex items-center gap-6">
                <!-- Logo en Header -->
                <img src="https://lh3.googleusercontent.com/u/0/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="h-12 drop-shadow-md" alt="Logo CEUT">
                
                <div class="h-10 w-px bg-white/10 hidden md:block"></div>
                
                <div>
                    <h1 class="text-xl font-black italic uppercase tracking-tighter">Consola <span class="text-yellow-500">Master</span></h1>
                    <p id="admin-info" class="text-[9px] opacity-40 uppercase font-bold tracking-[0.2em]">Cargando...</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="showChangePass()" class="glass-card p-3 rounded-xl hover:text-yellow-500 transition-colors">
                    <i data-lucide="key-round" class="w-4 h-4"></i>
                </button>
                <button onclick="handleLogout()" class="glass-card p-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-6 rounded-3xl border-l-4 border-l-yellow-500">
                <p class="text-[9px] opacity-40 uppercase font-black">Asistencias Totales</p>
                <h3 id="stat-attendance" class="text-3xl font-black italic text-yellow-500">0</h3>
            </div>
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-[9px] opacity-40 uppercase font-black">Alumnos Activos</p>
                <h3 id="stat-students" class="text-3xl font-black italic">0</h3>
            </div>
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-[9px] opacity-40 uppercase font-black">Docentes</p>
                <h3 id="stat-teachers" class="text-3xl font-black italic">0</h3>
            </div>
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-[9px] opacity-40 uppercase font-black">Clases Activas</p>
                <h3 id="stat-classes" class="text-3xl font-black italic">0</h3>
            </div>
        </div>

        <main class="glass-card rounded-[2.5rem] overflow-hidden">
            <div class="flex flex-wrap border-b border-white/5 px-8 pt-6 gap-4">
                <button id="tab-classes" class="tab-btn active px-4 py-4 text-[10px] font-black uppercase flex items-center gap-2">
                    <i data-lucide="clipboard-list" class="w-3 h-3"></i> Bitácora Global
                </button>
                <button id="tab-stats" class="tab-btn px-4 py-4 text-[10px] font-black uppercase flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="w-3 h-3"></i> Reporte de Faltas
                </button>
                <div class="ml-auto flex items-center pb-4">
                    <input id="global-search" type="text" placeholder="BUSCAR REGISTRO..." class="input-admin w-48 mr-2 uppercase font-bold">
                    <button onclick="exportFullReport()" class="bg-white text-slate-900 px-4 py-2 rounded-xl text-[9px] font-black uppercase flex items-center hover:bg-yellow-500 transition-colors">
                        <i data-lucide="download" class="w-3 h-3 mr-2"></i> PDF
                    </button>
                </div>
            </div>

            <div class="p-8 overflow-x-auto">
                <table class="w-full text-left border-separate border-spacing-y-2">
                    <thead class="text-[9px] uppercase opacity-30 font-black">
                        <tr id="table-head"></tr>
                    </thead>
                    <tbody id="table-body" class="text-[11px] font-bold"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal Editar -->
    <div id="edit-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/80 p-6">
        <div class="glass-card p-8 rounded-[2.5rem] max-w-md w-full border-t-4 border-t-yellow-500">
            <h2 class="text-lg font-black italic uppercase mb-6">Editar Registro</h2>
            <div id="edit-fields" class="space-y-4 mb-8"></div>
            <div class="flex gap-4">
                <button onclick="closeEdit()" class="flex-1 p-3 rounded-xl bg-white/5 font-bold uppercase text-[10px]">Cancelar</button>
                <button onclick="saveEdit()" class="flex-1 p-3 rounded-xl bg-yellow-500 text-slate-900 font-black uppercase text-[10px]">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ceut-system';

        let currentAdmin = null;
        let allData = { classes: [], attendance: [], students: [], teachers: [] };
        let activeTab = 'classes';
        let editingId = null;

        // AUTH LOGIC
        window.toggleRegister = (show) => {
            document.getElementById('login-form').classList.toggle('hidden', show);
            document.getElementById('register-form').classList.toggle('hidden', !show);
        };

        window.handleRegister = async () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if(!name || !email || pass.length < 6) return alert("Selecciona tu identidad y usa min. 6 caracteres.");

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, 'artifacts', appId, 'users', cred.user.uid, 'profile', 'data'), {
                    name, email, role: 'admin', ts: Date.now()
                });
                alert("Cuenta maestra creada. Bienvenido.");
            } catch(e) { alert("Error: " + e.message); }
        };

        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert("Acceso denegado."); }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                if (snap.exists() && snap.data().role === 'admin') {
                    currentAdmin = snap.data();
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('main-panel').classList.remove('hidden');
                    document.getElementById('admin-info').innerText = `ADMINISTRADOR: ${currentAdmin.name}`;
                    startListeners();
                } else {
                    await signOut(auth);
                    alert("No tienes permisos de administrador.");
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-panel').classList.add('hidden');
            }
            lucide.createIcons();
        });

        // DATA LISTENERS
        function startListeners() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'classes'), (snap) => {
                allData.classes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateStats();
                renderTable();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'all_attendance'), (snap) => {
                allData.attendance = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateStats();
                renderTable();
            });
            
            document.getElementById('stat-students').innerText = "120"; 
            document.getElementById('stat-teachers').innerText = "18";  
        }

        function updateStats() {
            document.getElementById('stat-classes').innerText = allData.classes.length;
            document.getElementById('stat-attendance').innerText = allData.attendance.length;
        }

        function renderTable() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            const queryText = document.getElementById('global-search').value.toUpperCase();

            body.innerHTML = "";
            if (activeTab === 'classes') {
                head.innerHTML = `<th>CLASE / DOCENTE</th><th>NIVEL</th><th>FECHA</th><th>ASISTENCIAS</th><th class="text-right">ACCIONES</th>`;
                allData.classes.filter(c => JSON.stringify(c).toUpperCase().includes(queryText)).forEach(c => {
                    const tr = document.createElement('tr');
                    tr.className = "bg-white/5 rounded-xl transition-all hover:bg-white/10";
                    tr.innerHTML = `
                        <td class="p-4 rounded-l-xl">
                            <div class="uppercase">${c.name}</div>
                            <div class="text-[8px] opacity-40 uppercase">${c.teacherName || 'DOCENTE'}</div>
                        </td>
                        <td><span class="bg-blue-500/10 text-blue-400 px-2 py-1 rounded text-[8px] uppercase">${c.level || 'N/A'}</span></td>
                        <td class="opacity-40">${new Date(c.createdAt).toLocaleDateString()}</td>
                        <td class="text-yellow-500">${c.attendanceCount || 0}</td>
                        <td class="p-4 rounded-r-xl text-right">
                            <button onclick="openEdit('classes', '${c.id}')" class="btn-action btn-edit"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="deleteItem('classes', '${c.id}')" class="btn-action btn-delete ml-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            } else {
                head.innerHTML = `<th>ALUMNO / FOLIO</th><th>CLASE</th><th>NIVEL</th><th>HORA</th><th class="text-right">ACCIONES</th>`;
                allData.attendance.filter(a => JSON.stringify(a).toUpperCase().includes(queryText)).forEach(a => {
                    const tr = document.createElement('tr');
                    tr.className = "bg-white/5 rounded-xl transition-all hover:bg-white/10";
                    tr.innerHTML = `
                        <td class="p-4 rounded-l-xl">
                            <div class="uppercase">${a.userName}</div>
                            <div class="text-[8px] opacity-40 uppercase">${a.folio}</div>
                        </td>
                        <td class="uppercase">${a.className}</td>
                        <td class="opacity-40 uppercase">${a.userLevel}</td>
                        <td>${new Date(a.ts).toLocaleTimeString()}</td>
                        <td class="p-4 rounded-r-xl text-right">
                            <button onclick="deleteItem('attendance', '${a.id}')" class="btn-action btn-delete"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            }
            lucide.createIcons();
        }

        window.deleteItem = async (col, id) => {
            if(!confirm("¿Estás seguro de eliminar este registro permanentemente?")) return;
            try {
                const path = col === 'classes' ? 'classes' : 'all_attendance';
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', path, id));
            } catch(e) { alert("Error al eliminar."); }
        };

        window.openEdit = (col, id) => {
            editingId = id;
            const item = allData.classes.find(c => c.id === id);
            const container = document.getElementById('edit-fields');
            container.innerHTML = `
                <div class="space-y-1">
                    <label class="text-[9px] uppercase font-bold opacity-40">Materia</label>
                    <input id="edit-name" value="${item.name}" class="input-admin w-full">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] uppercase font-bold opacity-40">Docente</label>
                    <input id="edit-teacher" value="${item.teacherName}" class="input-admin w-full">
                </div>
            `;
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.saveEdit = async () => {
            const name = document.getElementById('edit-name').value;
            const teacherName = document.getElementById('edit-teacher').value;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'classes', editingId), { name, teacherName });
            closeEdit();
        };

        window.closeEdit = () => document.getElementById('edit-modal').classList.add('hidden');

        ['classes', 'stats'].forEach(t => {
            document.getElementById(`tab-${t}`).onclick = () => {
                activeTab = t;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tab-${t}`).classList.add('active');
                renderTable();
            };
        });

        document.getElementById('global-search').oninput = renderTable;

        window.exportFullReport = () => {
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF();
            docPdf.setFillColor(0, 11, 33);
            docPdf.rect(0, 0, 210, 30, 'F');
            docPdf.setTextColor(255, 255, 255);
            docPdf.setFontSize(18);
            docPdf.text("CEUT UNIVERSIDAD - REPORTE MAESTRO", 15, 20);
            
            const data = activeTab === 'classes' ? 
                allData.classes.map(c => [c.name, c.teacherName, c.level, c.attendanceCount]) :
                allData.attendance.map(a => [a.userName, a.folio, a.className, new Date(a.ts).toLocaleDateString()]);
            
            const head = activeTab === 'classes' ? 
                [['MATERIA', 'DOCENTE', 'NIVEL', 'TOTAL']] :
                [['ALUMNO', 'FOLIO', 'CLASE', 'FECHA']];

            docPdf.autoTable({
                startY: 40,
                head: head,
                body: data,
                headStyles: { fillColor: [59, 75, 164] }
            });
            docPdf.save(`Reporte_CEUT_${activeTab}.pdf`);
        };

        window.showChangePass = async () => {
            const newP = prompt("Ingresa tu nueva contraseña (min 6):");
            if(newP && newP.length >= 6) {
                try {
                    await updatePassword(auth.currentUser, newP);
                    alert("Contraseña actualizada con éxito.");
                } catch(e) { alert("Error al actualizar. Por seguridad, re-inicia sesión e intenta de nuevo."); }
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
