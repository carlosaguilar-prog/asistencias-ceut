<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEUT | Consola de Control Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --ceut-blue: #3b4ba4;
            --ceut-blue-dark: #000b21;
            --ceut-gold: #eab308;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--ceut-blue-dark); 
            color: white; 
            min-height: 100vh;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .tab-btn {
            padding: 1rem;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            opacity: 0.5;
        }

        .tab-btn.active {
            opacity: 1;
            color: var(--ceut-gold);
            border-bottom-color: var(--ceut-gold);
            background: rgba(234, 179, 8, 0.05);
        }

        .input-ceut { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 0.5rem; 
            color: white; 
            padding: 0.6rem 1rem;
            width: 100%;
        }

        .input-ceut:focus { border-color: var(--ceut-gold); outline: none; }

        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-delete { color: #f87171; background: rgba(248, 113, 113, 0.1); }
        .btn-delete:hover { background: #f87171; color: white; }

        .btn-export { background: var(--ceut-gold); color: black; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Security Lock Screen -->
    <div id="auth-lock" class="fixed inset-0 z-50 bg-[#000b21] flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-32 mx-auto mb-8">
            <div class="glass-card p-8 rounded-3xl border-t-4 border-yellow-500">
                <h2 class="text-xl font-black uppercase italic mb-6">Acceso <span class="text-yellow-500">Administrativo</span></h2>
                <div class="space-y-4">
                    <input type="email" id="admin-email" placeholder="CORREO@CEUT.EDU.MX" class="input-ceut">
                    <input type="password" id="admin-pass" placeholder="••••••••" class="input-ceut">
                    <button id="login-btn" class="w-full py-4 bg-yellow-500 text-black font-black uppercase italic rounded-xl">Desbloquear Consola</button>
                </div>
                <p id="auth-status" class="mt-4 text-[10px] uppercase font-bold opacity-40"></p>
            </div>
        </div>
    </div>

    <!-- Main Panel -->
    <div id="admin-panel" class="hidden">
        <header class="bg-[#000d2b] border-b border-white/10 p-4 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-12">
                    <div>
                        <h1 class="text-sm font-black uppercase italic">Consola de <span class="text-yellow-500">Control</span></h1>
                        <p id="admin-user-tag" class="text-[9px] opacity-50 font-bold uppercase"></p>
                    </div>
                </div>
                <button id="logout-btn" class="p-2 bg-white/5 rounded-lg text-rose-500"><i data-lucide="log-out"></i></button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="glass-card p-5 rounded-2xl border-l-4 border-blue-500">
                    <p class="text-[8px] font-black text-slate-500 uppercase">Asistencias Hoy</p>
                    <h3 id="stat-asistencias" class="text-2xl font-black">0</h3>
                </div>
                <div class="glass-card p-5 rounded-2xl border-l-4 border-yellow-500">
                    <p class="text-[8px] font-black text-slate-500 uppercase">Total Alumnos</p>
                    <h3 id="stat-alumnos" class="text-2xl font-black">0</h3>
                </div>
                <div class="glass-card p-5 rounded-2xl border-l-4 border-green-500">
                    <p class="text-[8px] font-black text-slate-500 uppercase">Docentes Activos</p>
                    <h3 id="stat-docentes" class="text-2xl font-black">0</h3>
                </div>
                <div class="glass-card p-5 rounded-2xl border-l-4 border-purple-500">
                    <p class="text-[8px] font-black text-slate-500 uppercase">Pines Activos</p>
                    <h3 id="stat-clases" class="text-2xl font-black">0</h3>
                </div>
            </div>

            <!-- Nav -->
            <div class="flex flex-col md:flex-row justify-between items-end gap-4 mb-6">
                <div class="flex bg-white/5 p-1 rounded-xl w-full md:w-auto overflow-x-auto">
                    <button id="tab-asistencias" class="tab-btn flex-1 md:flex-none active">Asistencias</button>
                    <button id="tab-alumnos" class="tab-btn flex-1 md:flex-none">Alumnos</button>
                    <button id="tab-docentes" class="tab-btn flex-1 md:flex-none">Docentes</button>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <input type="text" id="table-search" placeholder="Buscar..." class="input-ceut">
                    <button id="export-btn" class="btn-action btn-export"><i data-lucide="file-down" class="w-4 h-4"></i> PDF</button>
                </div>
            </div>

            <!-- Table -->
            <div class="glass-card rounded-2xl overflow-hidden min-h-[300px]">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead id="table-head" class="bg-white/5 border-b border-white/10 text-[9px] font-black uppercase text-slate-500"></thead>
                        <tbody id="table-body" class="divide-y divide-white/5 text-[10px] font-bold uppercase italic"></tbody>
                    </table>
                </div>
                <div id="loading-state" class="p-20 text-center flex flex-col items-center opacity-30">
                    <i data-lucide="refresh-cw" class="animate-spin mb-4"></i>
                    <p class="text-xs">Sincronizando con base de datos...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCefP6qEqaCMpo8ZpUiLpN4e_-E4ZNTp94",
            authDomain: "asistencias-ceut.firebaseapp.com",
            projectId: "asistencias-ceut",
            storageBucket: "asistencias-ceut.firebasestorage.app",
            messagingSenderId: "130615246146",
            appId: "1:130615246146:web:6ae2c17c828fb28a809cdb"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ceut-prod-v2';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentTab = 'asistencias';
        let currentData = [];
        let unsubscribers = [];

        // UI Refs
        const authLock = document.getElementById('auth-lock');
        const adminPanel = document.getElementById('admin-panel');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const tableBody = document.getElementById('table-body');
        const tableHead = document.getElementById('table-head');
        const loadingState = document.getElementById('loading-state');
        const searchInput = document.getElementById('table-search');
        const authStatus = document.getElementById('auth-status');

        const getColRef = (name) => collection(db, 'artifacts', appId, 'public', 'data', name);

        // Fixed Auth initialization to prevent token mismatch errors blocking the UI
        const initAuth = async () => {
            authStatus.innerText = "Preparando entorno seguro...";
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenErr) {
                        console.warn("Token mismatch detected, falling back to anonymous.");
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth init error:", e);
                authStatus.innerText = "Error de conexión. Reintentando...";
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user && user.email) {
                authLock.classList.add('hidden');
                adminPanel.classList.remove('hidden');
                document.getElementById('admin-user-tag').innerText = user.email;
                startDataSync();
            } else {
                authLock.classList.remove('hidden');
                adminPanel.classList.add('hidden');
                clearUnsubscribers();
            }
            lucide.createIcons();
        });

        loginBtn.onclick = async () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            if(!email || !pass) return;
            try { 
                loginBtn.disabled = true;
                loginBtn.innerText = "VERIFICANDO...";
                await signInWithEmailAndPassword(auth, email, pass); 
            } catch (e) { 
                alert("ACCESO DENEGADO: Credenciales de administrador no válidas."); 
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerText = "Desbloquear Consola";
            }
        };

        logoutBtn.onclick = async () => {
            await signOut(auth);
            location.reload();
        };

        function clearUnsubscribers() {
            unsubscribers.forEach(un => un());
            unsubscribers = [];
        }

        function startDataSync() {
            if (!auth.currentUser?.email) return;
            clearUnsubscribers();

            const startOfToday = new Date().setHours(0,0,0,0);
            
            const stats = [
                { id: 'stat-asistencias', col: 'asistencias', filter: (d) => (d.data().ts || 0) >= startOfToday },
                { id: 'stat-alumnos', col: 'students_registry' },
                { id: 'stat-docentes', col: 'teachers_registry' },
                { id: 'stat-clases', col: 'active_pins' }
            ];

            stats.forEach(stat => {
                const unsub = onSnapshot(getColRef(stat.col), s => {
                    const val = stat.filter ? s.docs.filter(stat.filter).length : s.size;
                    document.getElementById(stat.id).innerText = val;
                }, e => console.warn(`Silent fail on stat: ${stat.col}`));
                unsubscribers.push(unsub);
            });

            syncTable();
        }

        function syncTable() {
            if (!auth.currentUser?.email) return;
            loadingState.classList.remove('hidden');
            tableBody.innerHTML = "";
            
            let colName = currentTab === 'asistencias' ? 'asistencias' : 
                          currentTab === 'alumnos' ? 'students_registry' : 'teachers_registry';

            const unsub = onSnapshot(getColRef(colName), snap => {
                loadingState.classList.add('hidden');
                currentData = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
                render();
            }, err => {
                loadingState.innerHTML = `<p class="text-xs text-rose-500">Error al cargar datos.</p>`;
            });
            unsubscribers.push(unsub);
        }

        function render() {
            const term = searchInput.value.toLowerCase();
            const filtered = currentData.filter(i => JSON.stringify(i).toLowerCase().includes(term));
            
            tableBody.innerHTML = "";
            if (currentTab === 'asistencias') {
                tableHead.innerHTML = `<tr><th class="p-4">Fecha/Hora</th><th class="p-4">Folio / Estudiante</th><th class="p-4">Materia</th><th class="p-4">Acciones</th></tr>`;
                filtered.sort((a,b) => (b.ts||0)-(a.ts||0)).forEach(item => {
                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="p-4 opacity-70">${item.ts ? new Date(item.ts).toLocaleString() : '---'}</td>
                            <td class="p-4"><span class="text-yellow-500 font-black">${item.folio || '---'}</span><br>${item.studentName || '---'}</td>
                            <td class="p-4">${item.className || '---'}</td>
                            <td class="p-4"><button onclick="window.delRec('asistencias', '${item._id}')" class="btn-delete">Eliminar</button></td>
                        </tr>`;
                });
            } else if (currentTab === 'alumnos') {
                tableHead.innerHTML = `<tr><th class="p-4">Folio ID</th><th class="p-4">Nombre Alumno</th><th class="p-4">Carrera / Nivel</th><th class="p-4">Acciones</th></tr>`;
                filtered.forEach(item => {
                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="p-4 text-yellow-500 font-black">${item.folio || item._id}</td>
                            <td class="p-4">${item.nombre || item.name || '---'}</td>
                            <td class="p-4 text-blue-400 text-[8px]">${item.carrera || '---'}<br>${item.nivel || ''}</td>
                            <td class="p-4"><button onclick="window.delRec('students_registry', '${item._id}')" class="btn-delete">Baja</button></td>
                        </tr>`;
                });
            } else if (currentTab === 'docentes') {
                tableHead.innerHTML = `<tr><th class="p-4">ID</th><th class="p-4">Docente</th><th class="p-4">Email</th><th class="p-4">Acciones</th></tr>`;
                filtered.forEach(item => {
                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="p-4 text-yellow-500 font-black">${item.id || item._id}</td>
                            <td class="p-4">${item.nombre || '---'}</td>
                            <td class="p-4 opacity-60 lowercase font-normal italic">${item.email || '---'}</td>
                            <td class="p-4"><button onclick="window.delRec('teachers_registry', '${item._id}')" class="btn-delete">Remover</button></td>
                        </tr>`;
                });
            }
            lucide.createIcons();
        }

        window.delRec = async (col, id) => {
            if (!confirm("ADVERTENCIA: ¿Estás seguro de eliminar este registro permanentemente?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
            } catch (e) { alert("Error al eliminar. Verifique permisos."); }
        };

        const tabs = ['asistencias', 'alumnos', 'docentes'];
        tabs.forEach(t => {
            document.getElementById(`tab-${t}`).onclick = () => {
                currentTab = t;
                tabs.forEach(id => document.getElementById(`tab-${id}`).classList.toggle('active', id === t));
                syncTable();
            };
        });

        searchInput.oninput = render;

        document.getElementById('export-btn').onclick = () => {
            if (!currentData.length) return;
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF('l', 'mm', 'a4');
            docPdf.setFontSize(16);
            docPdf.text(`CEUT | REPORTE DE ${currentTab.toUpperCase()}`, 14, 15);
            docPdf.setFontSize(10);
            docPdf.text(`Generado el: ${new Date().toLocaleString()}`, 14, 22);
            
            const columns = Object.keys(currentData[0]).filter(k => !k.startsWith('_') && k !== 'password');
            const body = currentData.map(row => columns.map(col => {
                if (col === 'ts') return new Date(row[col]).toLocaleString();
                return row[col] || '';
            }));

            docPdf.autoTable({
                head: [columns.map(c => c.toUpperCase())],
                body: body,
                startY: 30,
                styles: { fontSize: 7, cellPadding: 2 },
                headStyles: { fillColor: [59, 75, 164] }
            });
            docPdf.save(`Reporte_CEUT_${currentTab}_${Date.now()}.pdf`);
        };
    </script>
</body>
</html>
