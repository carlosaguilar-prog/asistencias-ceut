<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEUT | Consola Docente Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --ceut-blue-dark: #000b21; 
            --ceut-blue-brand: #3b4ba4; 
            --ceut-gold: #eab308; 
        }
        
        body { 
            background-color: var(--ceut-blue-dark); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white; 
            overflow-x: hidden; 
        }

        /* Fondo con gradiente institucional azul */
        .bg-mesh {
            background: linear-gradient(135deg, var(--ceut-blue-dark) 0%, #0a1a4a 100%);
            background-attachment: fixed;
        }

        .glass-card { 
            background: rgba(59, 75, 164, 0.05); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(234, 179, 8, 0.15); 
            border-radius: 2rem; 
        }

        .btn-gold { 
            background: linear-gradient(135deg, #fef08a, var(--ceut-gold), #ca8a04); 
            color: #000b21; 
            font-weight: 800; 
            text-transform: uppercase; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 10px 20px rgba(234, 179, 8, 0.2);
        }

        .btn-gold:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1); 
            box-shadow: 0 15px 30px rgba(234, 179, 8, 0.4);
        }

        .input-ceut { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(234, 179, 8, 0.2); 
            border-radius: 1rem; 
            color: white; 
            transition: all 0.3s; 
        }

        .input-ceut:focus { 
            border-color: var(--ceut-gold); 
            outline: none; 
            background: rgba(234, 179, 8, 0.08); 
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.1);
        }

        .hidden { display: none !important; }
        
        select option { 
            background: var(--ceut-blue-dark); 
            color: white; 
        }

        /* Scrollbar personalizada Oro */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--ceut-blue-dark); }
        ::-webkit-scrollbar-thumb { background: var(--ceut-gold); border-radius: 10px; }
    </style>
</head>
<body class="bg-mesh min-h-screen">

    <!-- LOGIN OVERLAY CON COLORES CEUT -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-[#000b21]/95 flex items-center justify-center p-6">
        <div class="glass-card p-10 w-full max-w-md text-center border-t-8 border-[#eab308]">
            <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-40 mx-auto mb-8" alt="Logo CEUT">
            <h2 class="text-2xl font-black uppercase italic mb-2 tracking-tight">Acceso Docente</h2>
            <p class="text-[10px] text-yellow-500 font-bold uppercase tracking-[0.3em] mb-8 italic">Orgullo y Excelencia</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">Correo Institucional</label>
                    <input type="email" id="email" placeholder="ejemplo@ceut.edu.mx" class="input-ceut w-full p-4 text-sm">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">Contraseña de Sistema</label>
                    <input type="password" id="pass" placeholder="••••••••" class="input-ceut w-full p-4 text-sm">
                </div>
                <button id="btn-login" class="btn-gold w-full py-4 rounded-xl text-xs mt-4">Entrar al Panel Tigre</button>
            </div>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="app-content" class="hidden max-w-6xl mx-auto p-6 pt-12">
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-16">
            <div class="flex items-center gap-6">
                <div class="w-20 h-20 rounded-[2rem] bg-yellow-500/10 flex items-center justify-center border-2 border-yellow-500/20 shadow-inner">
                    <i data-lucide="presentation" class="text-[#eab308] w-10 h-10"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black italic uppercase leading-none tracking-tighter">Panel <span class="text-[#eab308]">Docente</span></h1>
                    <div class="flex items-center gap-2 mt-2">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                        <span id="user-display" class="text-blue-300 text-[10px] font-black uppercase tracking-widest italic">Sesión Iniciada</span>
                    </div>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleSection('view-materias')" class="px-6 py-4 glass-card text-[10px] font-black uppercase italic hover:bg-yellow-500/10 hover:border-yellow-500 transition-all flex items-center gap-3">
                    <i data-lucide="book-open" class="w-4 h-4 text-[#eab308]"></i> Configurar Materias
                </button>
                <button id="btn-logout" class="p-4 glass-card text-rose-500 hover:bg-rose-500/10 border-rose-500/20"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- PASE DE LISTA AZUL/ORO -->
            <div id="view-pase-lista" class="lg:col-span-7 space-y-8">
                <div class="glass-card p-12 border-t-[12px] border-[#eab308] relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-8 opacity-5">
                        <i data-lucide="qr-code" class="w-32 h-32"></i>
                    </div>
                    
                    <h2 class="text-sm font-black italic uppercase mb-10 flex items-center gap-3">
                        <i data-lucide="zap" class="text-[#eab308] fill-[#eab308]"></i> Apertura de Clase
                    </h2>
                    
                    <div class="space-y-8">
                        <div class="group">
                            <label class="text-[10px] font-black uppercase text-yellow-500/60 mb-3 block tracking-[0.2em] italic">Materia a Impartir</label>
                            <select id="select-materia" class="input-ceut w-full p-5 text-base font-bold uppercase cursor-pointer">
                                <option value="">--- Selecciona Materia Guardada ---</option>
                            </select>
                            <p class="text-[9px] mt-3 text-slate-500 italic font-bold">Nota: Solo aparecen las materias registradas previamente.</p>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block italic">Grado</label>
                                <input type="text" id="active-grade" readonly class="input-ceut w-full p-4 text-sm font-black text-center bg-white/5 opacity-60">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block italic">Grupo</label>
                                <input type="text" id="active-group" readonly class="input-ceut w-full p-4 text-sm font-black text-center bg-white/5 opacity-60">
                            </div>
                        </div>

                        <button id="btn-open-class" class="btn-gold w-full py-6 rounded-2xl text-[12px] tracking-widest shadow-2xl">
                            Iniciar Pase de Lista Tigre
                        </button>
                    </div>
                </div>

                <!-- SESION ACTIVA -->
                <div id="active-session-card" class="hidden glass-card p-10 border-l-[12px] border-green-500 bg-green-500/5">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <span class="px-2 py-1 bg-green-500 text-black text-[8px] font-black uppercase italic rounded">En curso</span>
                                <h3 id="display-class-name" class="text-2xl font-black uppercase italic tracking-tighter">Materia</h3>
                            </div>
                            <p id="display-class-details" class="text-[10px] text-slate-400 font-bold uppercase italic tracking-widest"></p>
                        </div>
                        <div class="text-center">
                            <div class="text-[9px] font-black text-yellow-500 uppercase mb-1">Código QR</div>
                            <div id="display-class-code" class="text-4xl font-black text-white tracking-tighter bg-white/5 px-4 py-2 rounded-xl">000000</div>
                        </div>
                    </div>
                    <button id="btn-close-session" class="mt-8 w-full border border-rose-500/30 py-3 rounded-xl text-[10px] font-black text-rose-500 uppercase hover:bg-rose-500 hover:text-white transition-all italic">Finalizar y Cerrar Sesión</button>
                </div>
            </div>

            <!-- REGISTRO PERMANENTE -->
            <div id="view-materias" class="hidden lg:col-span-5 space-y-8 animate-fade-in">
                <div class="glass-card p-8 border-t-8 border-blue-500">
                    <h2 class="text-sm font-black italic uppercase mb-8 flex items-center gap-3">
                        <i data-lucide="plus-circle" class="text-blue-500"></i> Registrar Materia Nueva
                    </h2>
                    <div class="space-y-4">
                        <input type="text" id="reg-name" placeholder="NOMBRE DE LA ASIGNATURA" class="input-ceut w-full p-4 text-xs font-bold uppercase">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="reg-grade" placeholder="GRADO (EJ. 6TO)" class="input-ceut w-full p-4 text-xs font-bold uppercase">
                            <input type="text" id="reg-group" placeholder="GRUPO (EJ. A)" class="input-ceut w-full p-4 text-xs font-bold uppercase">
                        </div>
                        <select id="reg-level" class="input-ceut w-full p-4 text-xs font-bold">
                            <option value="UNIVERSIDAD">UNIVERSIDAD</option>
                            <option value="PREPARATORIA">PREPARATORIA</option>
                        </select>
                        <select id="reg-mode" class="input-ceut w-full p-4 text-xs font-bold">
                            <option value="ESCOLARIZADA">ESCOLARIZADA</option>
                            <option value="MIXTA">MIXTA (SABATINA)</option>
                        </select>
                        <button id="btn-save-materia" class="w-full bg-[#3b4ba4] text-white py-4 rounded-xl text-[10px] font-black uppercase italic hover:bg-blue-500 transition-all border border-white/10">
                            Guardar Permanente
                        </button>
                    </div>
                </div>

                <div class="glass-card p-8">
                    <h3 class="text-[10px] font-black uppercase text-yellow-500/60 mb-6 tracking-widest italic flex items-center gap-2">
                        <i data-lucide="list" class="w-3 h-3"></i> Mi Catálogo de Clases
                    </h3>
                    <div id="materias-list" class="space-y-3 max-h-80 overflow-y-auto pr-3">
                        <!-- Clases guardadas aquí -->
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCefP6qEqaCMpo8ZpUiLpN4e_-E4ZNTp94",
            authDomain: "asistencias-ceut.firebaseapp.com",
            projectId: "asistencias-ceut",
            storageBucket: "asistencias-ceut.firebasestorage.app",
            messagingSenderId: "130615246146",
            appId: "1:130615246146:web:6ae2c17c828fb28a809cdb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "asistencias-ceut-prod";

        let currentTeacherMaterias = [];

        function toggleSection(id) {
            const section = document.getElementById(id);
            const mainView = document.getElementById('view-pase-lista');
            section.classList.toggle('hidden');
            if (!section.classList.contains('hidden')) {
                mainView.classList.remove('lg:col-span-12');
                mainView.classList.add('lg:col-span-7');
            } else {
                mainView.classList.remove('lg:col-span-7');
                mainView.classList.add('lg:col-span-12');
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = `Docente: ${user.email}`;
                loadTeacherMaterias(user.uid);
                listenToActiveSessions(user.uid);
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        document.getElementById('btn-login').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("Ingresa datos");
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Error: Credenciales tigres incorrectas"); }
        };

        document.getElementById('btn-logout').onclick = () => auth.signOut();

        async function loadTeacherMaterias(uid) {
            db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('materias_docente')
                .onSnapshot(snap => {
                    const list = document.getElementById('materias-list');
                    const select = document.getElementById('select-materia');
                    list.innerHTML = "";
                    select.innerHTML = '<option value="">--- Selecciona Materia ---</option>';
                    currentTeacherMaterias = [];

                    snap.forEach(doc => {
                        const m = doc.data();
                        m.id = doc.id;
                        currentTeacherMaterias.push(m);

                        const div = document.createElement('div');
                        div.className = "flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5 hover:border-yellow-500/30 transition-all";
                        div.innerHTML = `
                            <div>
                                <div class="text-xs font-black uppercase text-white">${m.name}</div>
                                <div class="text-[8px] font-bold text-slate-500 uppercase mt-1 italic">${m.grade}° ${m.group} | ${m.mode}</div>
                            </div>
                            <button onclick="deleteMateria('${doc.id}')" class="text-rose-500/40 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        `;
                        list.appendChild(div);

                        const opt = document.createElement('option');
                        opt.value = m.id;
                        opt.innerText = `${m.name} [${m.grade}${m.group}]`;
                        select.appendChild(opt);
                    });
                    lucide.createIcons();
                });
        }

        document.getElementById('btn-save-materia').onclick = async () => {
            const name = document.getElementById('reg-name').value.toUpperCase();
            const grade = document.getElementById('reg-grade').value.toUpperCase();
            const group = document.getElementById('reg-group').value.toUpperCase();
            const level = document.getElementById('reg-level').value;
            const mode = document.getElementById('reg-mode').value;

            if(!name || !grade || !group) return alert("Completa los campos obligatorios");

            await db.collection('artifacts').doc(appId).collection('users').doc(auth.currentUser.uid).collection('materias_docente').add({
                name, grade, group, level, mode, ts: Date.now()
            });

            document.getElementById('reg-name').value = "";
            document.getElementById('reg-grade').value = "";
            document.getElementById('reg-group').value = "";
        };

        async function deleteMateria(id) {
            if(confirm("¿Eliminar del catálogo?")) {
                await db.collection('artifacts').doc(appId).collection('users').doc(auth.currentUser.uid).collection('materias_docente').doc(id).delete();
            }
        }

        document.getElementById('select-materia').onchange = (e) => {
            const selected = currentTeacherMaterias.find(m => m.id === e.target.value);
            if(selected) {
                document.getElementById('active-grade').value = selected.grade;
                document.getElementById('active-group').value = selected.group;
            } else {
                document.getElementById('active-grade').value = "";
                document.getElementById('active-group').value = "";
            }
        };

        document.getElementById('btn-open-class').onclick = async () => {
            const matId = document.getElementById('select-materia').value;
            if(!matId) return alert("Elige una materia de tu lista");

            const mat = currentTeacherMaterias.find(m => m.id === matId);
            const code = Math.floor(100000 + Math.random() * 900000).toString();

            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('clases').add({
                ...mat,
                code,
                profId: auth.currentUser.uid,
                ts: Date.now(),
                active: true
            });
            alert("Pase de lista abierto con éxito.");
        };

        function listenToActiveSessions(uid) {
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('clases')
                .where('profId', '==', uid)
                .onSnapshot(snap => {
                    const card = document.getElementById('active-session-card');
                    if(snap.empty) {
                        card.classList.add('hidden');
                    } else {
                        const sess = snap.docs[0].data();
                        const id = snap.docs[0].id;
                        card.classList.remove('hidden');
                        document.getElementById('display-class-name').innerText = sess.name;
                        document.getElementById('display-class-details').innerText = `${sess.level} | ${sess.grade}° ${sess.group} | ${sess.mode}`;
                        document.getElementById('display-class-code').innerText = sess.code;
                        
                        document.getElementById('btn-close-session').onclick = async () => {
                            if(confirm("¿Deseas cerrar el pase de lista actual?")) {
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('clases').doc(id).delete();
                            }
                        };
                    }
                });
        }

        lucide.createIcons();
    </script>
</body>
</html>
