<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEUT | Maestros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1e3a8a, #020617); color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-5">
                <img src="Gemini_Generated_Image_ob1grpob1grpob1g-removebg-preview.png" class="h-16" alt="Logo">
                <div>
                    <h1 class="text-2xl font-black italic uppercase leading-none">Panel <span class="text-yellow-500">Docente</span></h1>
                    <p class="text-[9px] font-bold opacity-30 uppercase tracking-[0.3em]">Catedrático Autorizado</p>
                </div>
            </div>
        </header>

        <div class="glass p-12 rounded-[4rem] border-t-4 border-t-yellow-500 shadow-2xl">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <h2 class="text-3xl font-black italic uppercase text-white">Mis Clases <span class="text-yellow-500 text-sm opacity-50 ml-2">Sábado</span></h2>
                </div>
                <div class="text-right opacity-40 text-[10px] font-bold uppercase tracking-widest">Ciclo Escolar 2024-B</div>
            </div>

            <div class="grid gap-6">
                <div class="glass p-10 rounded-[2.5rem] border-l-8 border-l-yellow-500 flex flex-col md:flex-row justify-between items-center hover:bg-white/5 transition-all group">
                    <div class="mb-4 md:mb-0">
                        <h3 class="text-2xl font-black italic uppercase text-yellow-500">Derecho Civil I</h3>
                        <div class="flex gap-4 mt-2">
                            <span class="text-[10px] opacity-60 font-bold uppercase flex items-center gap-2"><i data-lucide="clock" class="w-3 h-3"></i> 08:00 - 10:30</span>
                            <span class="text-[10px] opacity-60 font-bold uppercase flex items-center gap-2"><i data-lucide="map-pin" class="w-3 h-3"></i> Salón A-102</span>
                        </div>
                    </div>
                    <button class="bg-yellow-500 text-slate-900 px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-tighter hover:scale-105 transition-transform shadow-lg shadow-yellow-500/20">Iniciar Pase de Lista</button>
                </div>

                <div class="glass p-10 rounded-[2.5rem] border-l-8 border-l-slate-700 flex flex-col md:flex-row justify-between items-center opacity-60">
                    <div class="mb-4 md:mb-0 text-white">
                        <h3 class="text-2xl font-black italic uppercase opacity-50">Criminalística</h3>
                        <div class="flex gap-4 mt-2">
                            <span class="text-[10px] opacity-60 font-bold uppercase flex items-center gap-2">10:30 - 13:00</span>
                        </div>
                    </div>
                    <span class="text-[10px] font-black uppercase tracking-widest bg-white/5 px-6 py-3 rounded-xl border border-white/10">Próxima Clase</span>
                </div>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
