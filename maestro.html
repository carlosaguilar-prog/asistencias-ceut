<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CEUT | Consola del Maestro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --ceut-blue: #1e40af; 
            --bg-slate: #f8fafc;
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; background-color: var(--bg-slate); font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; height: 100%; }

        .view-section { display: none; width: 100%; min-height: 100vh; flex-direction: column; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .view-section.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .input-ceut {
            width: 100%; padding: 0.8rem 1rem; border: 2px solid #e2e8f0; border-radius: 14px; 
            font-size: 13px; font-weight: 600; transition: all 0.2s; background: white;
        }
        .input-ceut:focus { border-color: var(--ceut-blue); box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1); }

        .btn-primary {
            background: var(--ceut-blue); color: white; padding: 1.1rem; border-radius: 20px; font-weight: 800;
            font-size: 11px; text-transform: uppercase; border: none; cursor: pointer; width: 100%;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 25px -5px rgba(30, 64, 175, 0.3);
        }
        .btn-primary:active { transform: scale(0.95); }
        .card-glass { background: white; border: 1px solid #e2e8f0; border-radius: 2.5rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #0f172a; color: white; padding: 12px 24px; border-radius: 50px;
            font-size: 11px; font-weight: 800; z-index: 10000; display: none;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }
        .qr-container canvas { margin: 0 auto; border: 10px solid white; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="toast">MENSAJE</div>

    <!-- MODAL QR -->
    <div id="modal-qr" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[10000] hidden items-center justify-center p-4">
        <div class="bg-white rounded-[3rem] p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 id="qr-class-name" class="text-xl font-black mb-1 uppercase tracking-tighter italic">MATERIA</h3>
            <p id="qr-class-info" class="text-[9px] font-bold text-slate-400 mb-6 uppercase tracking-widest italic">GRADO - GRUPO</p>
            <div id="qrcode" class="qr-container mb-6 flex justify-center"></div>
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-6">
                <p class="text-[10px] font-black text-slate-400 mb-2 uppercase italic">Estado de Sesión</p>
                <div class="flex items-center justify-center gap-4">
                    <span id="status-text" class="text-xs font-black text-green-600">ABIERTA</span>
                    <button id="toggle-session-btn" class="w-12 h-6 bg-green-500 rounded-full relative p-1 transition-all">
                        <div class="w-4 h-4 bg-white rounded-full absolute right-1"></div>
                    </button>
                </div>
            </div>
            <button onclick="closeQRModal()" class="w-full py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Cerrar Panel</button>
        </div>
    </div>

    <!-- VISTA AUTH -->
    <section id="view-auth" class="view-section active p-8 items-center justify-center bg-slate-50">
        <div class="w-full max-w-sm">
            <a href="index.html" class="mb-10 text-[10px] font-black text-slate-400 uppercase flex items-center gap-3 decoration-none">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> VOLVER AL MENÚ
            </a>
            <h2 class="text-3xl font-black mb-6 uppercase text-slate-900 tracking-tighter italic">DOCENTES CEUT</h2>
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="correo@ceut.edu.mx" class="input-ceut">
                <input type="password" id="authPass" placeholder="CONTRASEÑA" class="input-ceut">
                <button id="btn-submit-auth" class="btn-primary mt-6 py-5 italic tracking-tighter">INGRESAR A CONSOLA</button>
            </div>
        </div>
    </section>

    <!-- PANEL DOCENTE PRINCIPAL -->
    <section id="view-teacher" class="view-section p-6 bg-slate-50 overflow-y-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <img src="https://lh3.googleusercontent.com/d/17NobXQ3JbRnLGejZe4Mn2x-Jl45F4rPm" class="w-10" alt="Logo">
                <div>
                    <p id="prof-name" class="text-sm font-black uppercase text-slate-900 leading-none">Cargando...</p>
                    <span class="text-blue-600 text-[9px] font-black uppercase tracking-widest italic">Panel de Control Docente</span>
                </div>
            </div>
            <button onclick="handleLogout()" class="text-rose-500 p-2"><i data-lucide="log-out"></i></button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 card-glass p-8 h-fit">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-6 tracking-widest flex items-center gap-2 italic">
                    <i data-lucide="plus" class="w-4 h-4"></i> NUEVA CLASE
                </h3>
                <div class="space-y-3">
                    <input type="text" id="classMat" placeholder="NOMBRE MATERIA" class="input-ceut uppercase">
                    <select id="classLev" class="input-ceut">
                        <option value="">NIVEL</option>
                        <option value="PREPARATORIA">PREPARATORIA</option>
                        <option value="LICENCIATURA">LICENCIATURA</option>
                    </select>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="classDeg" placeholder="GRADO" class="input-ceut uppercase">
                        <input type="text" id="classGru" placeholder="GRUPO" class="input-ceut uppercase">
                    </div>
                    <button onclick="createNewClass()" class="btn-primary py-4 mt-4 italic">ABRIR PASE DE LISTA</button>
                </div>
            </div>

            <div class="lg:col-span-8 card-glass p-8">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-6 tracking-widest italic">MATERIAS ACTIVAS</h3>
                <div id="teacher-classes-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, where, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Configuración de Firebase - Asegúrate de que estos valores coincidan con tu consola
        const firebaseConfig = {
            apiKey: "AIzaSyCefP6qEqaCMpo8ZpUiLpN4e_-E4ZNTp94",
            authDomain: "asistencias-ceut.firebaseapp.com",
            projectId: "asistencias-ceut",
            storageBucket: "asistencias-ceut.firebasestorage.app",
            messagingSenderId: "130615246146",
            appId: "1:130615246146:web:6ae2c17c828fb28a809cdb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'ceut_asistencias_v1';

        let currentUser = null;
        let myClasses = [];

        // GPS
        const getCoords = () => new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(p => res({ lat: p.coords.latitude, lng: p.coords.longitude }), e => rej(e), { enableHighAccuracy: true });
        });

        // Crear Clase
        window.createNewClass = async () => {
            const mat = document.getElementById('classMat').value.trim();
            const lev = document.getElementById('classLev').value;
            const deg = document.getElementById('classDeg').value.trim();
            const gru = document.getElementById('classGru').value.trim();

            if(!mat || !lev) return showToast("⚠️ DATOS INCOMPLETOS");

            try {
                showToast("📍 VALIDANDO GPS...");
                const coords = await getCoords();
                const classId = `CLS-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;
                const otp = Math.floor(100000 + Math.random() * 900000).toString(); // Código numérico de respaldo
                
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'classes', classId), {
                    id: classId,
                    otp: otp,
                    name: mat.toUpperCase(),
                    level: lev,
                    degree: deg.toUpperCase(),
                    group: gru.toUpperCase(),
                    teacherId: auth.currentUser.uid,
                    teacherName: auth.currentUser.email.split('@')[0].toUpperCase(),
                    coords: coords,
                    isOpen: true,
                    createdAt: Date.now()
                });
                showToast("✅ CLASE ABIERTA");
                document.getElementById('classMat').value = "";
            } catch(e) {
                showToast("❌ ACTIVA EL GPS");
            }
        };

        // QR
        window.openQR = (id) => {
            const c = myClasses.find(x => x.id === id);
            document.getElementById('qr-class-name').innerText = c.name;
            document.getElementById('qr-class-info').innerText = `${c.level} | ${c.degree}-${c.group}`;
            
            const qrdiv = document.getElementById('qrcode');
            qrdiv.innerHTML = "";
            
            // Generamos el QR con el ID de la clase
            new QRCode(qrdiv, { 
                text: id, 
                width: 200, 
                height: 200, 
                colorDark: "#1e40af",
                correctLevel : QRCode.CorrectLevel.H
            });
            
            document.getElementById('modal-qr').classList.replace('hidden', 'flex');
        };

        window.closeQRModal = () => document.getElementById('modal-qr').classList.replace('flex', 'hidden');

        // Render
        function renderClasses(classes) {
            myClasses = classes;
            const container = document.getElementById('teacher-classes-list');
            if(classes.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center py-10 text-slate-300 italic font-bold uppercase text-[10px]">No tienes clases activas</p>`;
                return;
            }
            container.innerHTML = classes.map(c => `
                <div class="p-6 bg-slate-900 rounded-[2rem] text-white">
                    <h4 class="font-black italic uppercase text-sm">${c.name}</h4>
                    <p class="text-[9px] text-slate-400 mb-4 uppercase font-bold">${c.level} | ${c.degree}-${c.group}</p>
                    <div class="bg-white/5 p-3 rounded-xl mb-4 text-center">
                         <p class="text-[8px] text-slate-500 uppercase font-bold">Código Numérico (OTP)</p>
                         <p class="text-xl font-black tracking-[0.3em] text-blue-400">${c.otp || '---'}</p>
                    </div>
                    <div class="flex justify-between items-center border-t border-white/10 pt-4">
                        <span class="text-[9px] font-bold text-slate-500 uppercase">ID: ${c.id}</span>
                        <button onclick="openQR('${c.id}')" class="bg-blue-600 p-2.5 rounded-xl transition-transform active:scale-90">
                            <i data-lucide="qr-code" class="w-4 h-4 text-white"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Auth
        document.getElementById('btn-submit-auth').onclick = async () => {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            if(!email || !pass) return showToast("⚠️ INGRESA TUS DATOS");
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch(e) { showToast("❌ ACCESO DENEGADO"); }
        };

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'));
                document.getElementById('prof-name').innerText = snap.exists() ? snap.data().name : u.email.split('@')[0].toUpperCase();
                
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'classes'), where("teacherId", "==", u.uid));
                onSnapshot(q, s => renderClasses(s.docs.map(d => d.data())), (err) => console.error(err));
                
                document.getElementById('view-auth').classList.remove('active');
                document.getElementById('view-teacher').classList.add('active');
            } else {
                document.getElementById('view-teacher').classList.remove('active');
                document.getElementById('view-auth').classList.add('active');
            }
            lucide.createIcons();
        });

        window.handleLogout = () => signOut(auth);
        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
